<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>征途 · 长征交互体验</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap');

  :root{
    --bg:#080612;
    --c-gold:#f0d880;
    --c-gold2:#c8a030;
    --c-red:#cc2020;
    --c-text:rgba(240,230,200,.85);
    --c-dim:rgba(240,230,200,.35);
    --font-main:'ZCOOL XiaoWei',serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--bg);
    font-family:var(--font-main);
    color:var(--c-text);
    min-height:100vh;
    overflow:hidden;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }

  /* ── 星星 ── */
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

  /* ── 雾气 ── */
  .fog{position:fixed;inset:-20%;width:140%;height:140%;
    border-radius:50%;pointer-events:none;}
  .fog:nth-child(1){background:radial-gradient(ellipse,rgba(42,24,64,.22) 0%,transparent 70%);
    animation:fogDrift 14s ease-in-out infinite;}
  .fog:nth-child(2){background:radial-gradient(ellipse,rgba(26,40,64,.18) 0%,transparent 65%);
    animation:fogDrift 18s ease-in-out infinite;animation-delay:-5s;left:-10%;}
  .fog:nth-child(3){background:radial-gradient(ellipse,rgba(16,24,48,.15) 0%,transparent 60%);
    animation:fogDrift 22s ease-in-out infinite;animation-delay:-9s;top:-10%;}
  @keyframes fogDrift{
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(3%,2%) scale(1.04)}
    66%{transform:translate(-2%,3%) scale(.97)}
  }

  /* ── 主容器 ── */
  .container{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    align-items:center;
    gap:0;
  }

  /* ── 标题区 ── */
  .title-wrap{
    text-align:center;
    margin-bottom:52px;
    opacity:0;animation:fadeUp .8s ease .2s forwards;
  }
  .title-sub{
    font-size:clamp(11px,1.2vw,13px);
    letter-spacing:.55em;
    color:var(--c-dim);
    margin-bottom:14px;
  }
  .title-main{
    font-size:clamp(32px,5vw,58px);
    letter-spacing:.4em;
    color:var(--c-gold);
    text-shadow:0 0 40px rgba(240,216,128,.35),0 0 80px rgba(200,160,40,.15);
    line-height:1.1;
  }
  .title-divider{
    width:120px;height:1px;
    background:linear-gradient(90deg,transparent,var(--c-gold2),transparent);
    margin:18px auto 0;
    opacity:.5;
  }

  /* ── 卡片网格 ── */
  .cards{
    display:flex;gap:28px;
    flex-wrap:wrap;justify-content:center;
  }

  .card{
    position:relative;
    width:clamp(220px,22vw,280px);
    padding:32px 24px 28px;
    border:1px solid rgba(240,216,128,.15);
    background:rgba(8,6,18,.7);
    backdrop-filter:blur(6px);
    cursor:pointer;
    text-decoration:none;
    color:inherit;
    transition:border-color .35s,transform .35s,box-shadow .35s;
    opacity:0;
  }
  .card:nth-child(1){animation:fadeUp .8s ease .4s forwards;}
  .card:nth-child(2){animation:fadeUp .8s ease .6s forwards;}
  .card:nth-child(3){animation:fadeUp .8s ease .8s forwards;}

  .card:hover{
    border-color:rgba(240,216,128,.5);
    transform:translateY(-6px);
    box-shadow:0 12px 40px rgba(240,216,128,.08),0 0 0 1px rgba(240,216,128,.08);
  }
  .card.disabled{opacity:.4!important;cursor:not-allowed;pointer-events:none;}

  /* 左上角角标 */
  .card::before{
    content:'';position:absolute;top:-1px;left:-1px;
    width:24px;height:24px;
    border-top:2px solid var(--c-gold2);
    border-left:2px solid var(--c-gold2);
    opacity:.6;transition:opacity .35s;
  }
  .card:hover::before{opacity:1;}
  .card::after{
    content:'';position:absolute;bottom:-1px;right:-1px;
    width:24px;height:24px;
    border-bottom:2px solid var(--c-gold2);
    border-right:2px solid var(--c-gold2);
    opacity:.6;transition:opacity .35s;
  }
  .card:hover::after{opacity:1;}

  .card-tag{
    font-size:10px;letter-spacing:.4em;
    color:var(--c-gold2);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .card-tag::before{
    content:'';display:inline-block;
    width:20px;height:1px;background:var(--c-gold2);opacity:.6;
  }
  .card-icon{
    font-size:36px;margin-bottom:16px;
    filter:drop-shadow(0 0 8px rgba(240,216,128,.3));
  }
  .card-title{
    font-size:clamp(18px,2vw,22px);
    letter-spacing:.3em;
    color:var(--c-gold);
    margin-bottom:10px;
    line-height:1.3;
  }
  .card-desc{
    font-size:clamp(11px,1.1vw,12px);
    letter-spacing:.18em;
    color:var(--c-dim);
    line-height:1.9;
  }
  .card-enter{
    margin-top:20px;
    font-size:11px;letter-spacing:.35em;
    color:rgba(240,216,128,.5);
    display:flex;align-items:center;gap:6px;
    transition:color .25s,gap .25s;
  }
  .card:hover .card-enter{color:var(--c-gold);gap:10px;}
  .card-enter::after{content:'→';}

  .badge-soon{
    position:absolute;top:14px;right:14px;
    font-size:9px;letter-spacing:.25em;
    color:rgba(240,216,128,.4);
    border:1px solid rgba(240,216,128,.2);
    padding:3px 8px;
  }

  /* ── 底部 ── */
  .footer{
    margin-top:44px;
    font-size:10px;letter-spacing:.3em;
    color:rgba(240,230,200,.2);
    text-align:center;
    opacity:0;animation:fadeUp .8s ease 1s forwards;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(18px);}
    to{opacity:1;transform:translateY(0);}
  }
  /* ── 响应式：手机竖屏单列 ── */
  @media (max-width:600px),(max-height:500px) and (orientation:portrait){
    .cards{flex-direction:column;align-items:center;gap:18px;}
    .card{width:min(85vw,320px);}
    .title-main{font-size:clamp(28px,8vw,44px);}
    .title-wrap{margin-bottom:32px;}
  }
  @media (orientation:landscape) and (max-height:480px){
    /* 手机横屏：缩小间距 */
    .container{gap:0;}
    .title-wrap{margin-bottom:20px;}
    .title-main{font-size:clamp(22px,4vw,36px);}
    .cards{gap:16px;}
    .card{padding:18px 16px 16px;}
    .card-icon{font-size:24px;margin-bottom:8px;}
  }
  /* ── 响应式：手机竖屏单列 ── */
  @media (max-width:600px),(orientation:portrait) and (max-width:900px){
    body{overflow-y:auto;justify-content:flex-start;padding:40px 16px 40px;}
    .title-main{font-size:clamp(28px,8vw,44px);}
    .cards{flex-direction:column;align-items:center;gap:20px;}
    .card{width:min(90vw,360px);}
    .title-wrap{margin-bottom:32px;}
  }
  /* 横屏手机 */
  @media (orientation:landscape) and (max-height:500px){
    body{overflow-y:auto;}
    .title-main{font-size:clamp(22px,4vw,36px);}
    .title-wrap{margin-bottom:24px;}
    .card{padding:20px 18px 18px;}
    .cards{gap:16px;}
  }
</style>
</head>
<body>

<!-- 星星 -->
<canvas id="stars"></canvas>
<!-- 雾气 -->
<div class="fog"></div>
<div class="fog"></div>
<div class="fog"></div>

<div class="container">
  <!-- 标题 -->
  <div class="title-wrap">
    <div class="title-sub">长征交互体验项目</div>
    <div class="title-main">征 途</div>
    <div class="title-divider"></div>
  </div>

  <!-- 卡片 -->
  <div class="cards">

    <!-- 征途·戍行录 -->
    <a class="card" href="zhengtu_v4_act1.html">
      <div class="card-tag">叙事交互</div>
      <div class="card-icon">📜</div>
      <div class="card-title">征途·戍行录</div>
      <div class="card-desc">七幕沉浸式叙事<br/>跟随一名红军战士<br/>走完那条路</div>
      <div class="card-enter">进入故事</div>
    </a>

    <!-- 薪火征程 -->
    <a class="card" href="game_a.html">
      <div class="card-tag">互动游戏</div>
      <div class="card-icon">🔥</div>
      <div class="card-title">薪火征程</div>
      <div class="card-desc">点燃每一支火把<br/>传递长征的精神<br/>照亮前行的道路</div>
      <div class="card-enter">开始游戏</div>
    </a>

    <!-- 征途·红星 -->
    <a class="card" href="game_b.html">
      <div class="card-tag">互动游戏</div>
      <div class="card-icon">⭐</div>
      <div class="card-title">征途·红星</div>
      <div class="card-desc">另一种方式体验<br/>那段峥嵘岁月<br/>再走一次长征路</div>
      <div class="card-enter">开始游戏</div>
    </a>

  </div>

</div>

<script>
// 星星动画
const c=document.getElementById('stars');
const ctx=c.getContext('2d');
let stars=[];
function resize(){
  c.width=window.innerWidth;c.height=window.innerHeight;
  stars=Array.from({length:160},()=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    r:.4+Math.random()*1.4,
    a:Math.random(),da:(Math.random()-.5)*.008
  }));
}
resize();
window.addEventListener('resize',resize);
function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    s.a=Math.max(.05,Math.min(1,s.a+s.da));
    if(s.a<=.05||s.a>=1) s.da*=-1;
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
