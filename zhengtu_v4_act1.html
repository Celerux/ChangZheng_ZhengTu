══════════════════════════════════════════════════════════ */
let act6={
  eraseData:null,glyphShown:false,oldmanShown:false,
  sceneShown:null, // 当前显示的场景id
  sub0:false,sub1:false,sub2:false,sub2b:false,sub2c:false,
  sub3:false,sub4:false,sub5:false
};

// 切换第六幕场景图的工具函数
function act6ShowScene(id){
  const scenes=['act6-soldier','act6-scene1','act6-scene2','act6-scene3','act6-scene4'];
  scenes.forEach(sid=>{
    const el=qs(sid);
    if(el) el.classList.toggle('show', sid===id);
  });
  act6.sceneShown=id;
}

function initAct6(){
  act6={eraseData:null,glyphShown:false,oldmanShown:false,
    sceneShown:null,scene1Ready:false,
    sub0:false,sub1:false,sub2:false,sub2b:false,sub2c:false,
    sub3:false,sub4:false,sub5:false};

  // 初始化canvas
  const ec=qs('s6-erase');ec.width=W();ec.height=H();
  const sc=qs('s6-storm');sc.width=W();sc.height=H();

  // 雪地擦除事件
  const scEl=qs('scene-6');
  scEl.addEventListener('mousemove',act6EraseMove);
  scEl.addEventListener('touchmove',act6EraseTouch,{passive:true});

  // 初始化擦除层：将act6_snow.png绘制到canvas
  act6.eraseData={covered:true,eraseAmount:0};
  const ec2=qs('s6-erase');
  const ectx2=ec2.getContext('2d');
  const snowImg=new Image();
  snowImg.src='act6_snow.png';
  act6._snowImg=snowImg;
  const drawSnow=()=>{
    ectx2.clearRect(0,0,ec2.width,ec2.height);
    ectx2.drawImage(snowImg,0,0,ec2.width,ec2.height);
  };
  if(snowImg.complete&&snowImg.naturalWidth>0) drawSnow();
  else snowImg.addEventListener('load',drawSnow,{once:true});

  // 重置所有场景
  act6ShowScene(null);
  qs('act6-oldman-wrap').classList.remove('show');
  qs('act6-oldman-dialog').classList.remove('show');
}

function act6EraseMove(e){
  if(phase!=='main'||currentAct!==6) return;
  hideHint();
  const ec=qs('s6-erase');if(!ec)return;
  const ectx=ec.getContext('2d');
  ectx.globalCompositeOperation='destination-out';
  ectx.beginPath();ectx.arc(e.clientX,e.clientY,30,0,Math.PI*2);ectx.fill();
  ectx.globalCompositeOperation='source-over';
  act6.eraseData.eraseAmount=Math.min(1,act6.eraseData.eraseAmount+.012);
}
function act6EraseTouch(e){
  act6EraseMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});
}

function updateAct6(progress,sy){
  parallax(6,sy);

  // 暴风雪（scene1/3/4显示时继续飘雪，soldier/scene2时停）
  const sc=qs('s6-storm');
  if(sc){
    const sctx=sc.getContext('2d');
    sctx.clearRect(0,0,sc.width,sc.height);
    const snowCount=60;
    const t=Date.now()*.001;
    for(let i=0;i<snowCount;i++){
      const x=((i/snowCount+t*.04)%1)*sc.width;
      const y=((i*.37+t*.15)%1)*sc.height;
      sctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(i)*0.2})`;
      sctx.beginPath();sctx.arc(x,y,1.5+Math.sin(i*.7),0,Math.PI*2);sctx.fill();
    }
    sctx.strokeStyle='rgba(255,255,255,.08)';sctx.lineWidth=1;
    for(let i=0;i<20;i++){
      const x=((i/20+t*.08)%1.2-.1)*sc.width;
      const y=((i*.13+t*.06)%1)*sc.height;
      sctx.beginPath();sctx.moveTo(x,y);sctx.lineTo(x+30,y+12);sctx.stroke();
    }
  }

  // 擦雪进度→触发字幕
  const ea=act6.eraseData?.eraseAmount||0;
  if(ea>.35&&!act6.glyphShown){
    act6.glyphShown=true;
    showSub('古人也走过这里吗？','narrate');
  }

  // ── 进度节点 ──
  if(progress>.04&&!act6.sub0){act6.sub0=true;
    showSub('风像刀子，我感觉自己是一片冻硬的树皮。','narrate');}

  // 18%：字幕→soldier场景
  if(progress>.18&&!act6.sub1){act6.sub1=true;
    showSub('有人坐下休息，就再也没起来。','narrate');
    setTimeout(()=>{
      // 隐藏scene-6底层（岩石+雪canvas），避免切场景时透出
      qs('scene-6').style.opacity='0';
      act6ShowScene('act6-soldier');
    },1000);
  }

  // 35%：soldier上出现老兵对话框
  if(progress>.35&&!act6.oldmanShown){
    act6.oldmanShown=true;
    qs('act6-oldman-wrap').classList.add('show');
    setTimeout(()=>{
      qs('act6-oldman-dialog').classList.add('show');
      showSub('小鬼……活……着……','npc','老兵');
    },400);
    // 对话结束后切scene1，设置门控
    setTimeout(()=>{
      qs('act6-oldman-dialog').classList.remove('show');
      qs('act6-oldman-wrap').classList.remove('show');
      act6ShowScene('act6-scene1');
      showSub('又一个战友，留在了山上。','narrate');
      // 2秒后才允许触发下一句
      setTimeout(()=>{ act6.scene1Ready=true; },2000);
    },4000);
  }

  // 50%：切scene3，必须等scene1Ready才触发
  if(progress>.50&&act6.scene1Ready&&!act6.sub2){act6.sub2=true;
    act6ShowScene('act6-scene3');
    showSub('我想起政委教我写「活」字。','narrate');}

  // 60%：scene3上继续字幕
  if(progress>.60&&!act6.sub2b){act6.sub2b=true;
    showSub('左边三点水，右边一个「舌」。','narrate');}

  // 70%：scene3上继续字幕
  if(progress>.70&&!act6.sub2c){act6.sub2c=true;
    showSub('活着，就是把凉的化成热的。','narrate');}

  // 80%：切scene2，「再翻过这座山……」
  if(progress>.80&&!act6.sub3){act6.sub3=true;
    act6ShowScene('act6-scene2');
    showSub('再翻过这座山，就是希望。','narrate');}

  // 90%：切scene4（主角爬山背影）
  if(progress>.90&&!act6.sub4){act6.sub4=true;
    act6ShowScene('act6-scene4');}

  if(progress>.95) switchToAct(7);
}

/* ══════════════════════════════════════════════════════════

   ██████  第七幕  ██████  会宁会师

══════════════════════════════════════════════════════════ */
let act7={
  circlePoints:[],circleCount:0,petalParticles:[],
  trailPoints:[],
  memoryPlayed:false,finalShown:false,
  sub0:false,sub0b:false,sub1:false,sub1a:false,sub1b:false,
  sub1c:false,sub1d:false,sub1e:false,
  sub2:false,sub3:false,sub3b:false,sub4:false,sub5:false
};

function initAct7(){
  act7={circlePoints:[],circleCount:0,petalParticles:[],
    trailPoints:[],
    memoryPlayed:false,finalShown:false,
    sub0:false,sub0b:false,sub1:false,sub1a:false,sub1b:false,
    sub1c:false,sub1d:false,sub1e:false,
    sub2:false,sub3:false,sub3b:false,sub4:false,sub5:false};

  const pc=qs('s7-petals');pc.width=W();pc.height=H();
  const mc=qs('act7-memory-canvas');mc.width=W();mc.height=H();
  // 轨迹canvas
  const tc=qs('act7-trail-canvas');tc.width=W();tc.height=H();

  // 画圈检测绑定到document，确保接收到事件
  function onMove(e){
    if(phase!=='main'||currentAct!==7) return;
    const cx=e.clientX??e.touches?.[0]?.clientX??0;
    const cy=e.clientY??e.touches?.[0]?.clientY??0;
    act7CircleMove(cx,cy);
  }
  function onUp(){ act7.circlePoints=[]; act7.trailPoints=[]; }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:true});
  document.addEventListener('touchend',onUp,{passive:true});
  act7._handlers={onMove,onUp};

  // 进入第七幕显示画圈提示
  setTimeout(()=>setHint('用金色的轨迹画一个圆满的圆吧！'),800);
}

let act7LastCircleCheck=0;
function act7CircleMove(cx,cy){
  hideHint();
  const now=Date.now();
  act7.circlePoints.push({x:cx,y:cy,t:now});
  act7.trailPoints.push({x:cx,y:cy,t:now});
  // 轨迹超过120个点时裁剪
  if(act7.circlePoints.length>120) act7.circlePoints.shift();
  // 轨迹点保留最近1.5秒
  act7.trailPoints=act7.trailPoints.filter(p=>now-p.t<1500);

  // 每100ms检测一次（更频繁）
  if(now-act7LastCircleCheck>100){
    act7LastCircleCheck=now;
    if(detectCircle(act7.circlePoints)){
      act7.circleCount++;
      act7.circlePoints=[];
      // 成功画圈：轨迹闪白后清除
      act7TrailFlash();
      spawnSymbolPetals(act7.circleCount);
      // 画1个圈后提示下滑
      if(act7.circleCount>=1) setHint('↓ 下滑继续');
    }
  }
}

function act7TrailFlash(){
  // 短暂把轨迹变成亮白色再消失
  act7._trailFlash=true;
  setTimeout(()=>{
    act7._trailFlash=false;
    act7.trailPoints=[];
  },300);
}

function detectCircle(pts){
  if(pts.length<25) return false;
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const cx=(Math.max(...xs)+Math.min(...xs))/2;
  const cy=(Math.max(...ys)+Math.min(...ys))/2;
  const radii=pts.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2));
  const avgR=radii.reduce((a,b)=>a+b,0)/radii.length;
  const variance=radii.reduce((a,r)=>a+Math.abs(r-avgR),0)/radii.length;
  const startEnd=Math.sqrt((pts[0].x-pts[pts.length-1].x)**2+(pts[0].y-pts[pts.length-1].y)**2);
  // 放宽条件：variance<50%，闭合距离<1.5倍半径，最小半径30px
  return variance<avgR*.50&&startEnd<avgR*1.5&&avgR>30;
}

// 大娘儿子对话框显示
function act7SonSay(text){
  const dlg=qs('act7-son-dialog');
  const txt=qs('act7-son-text');
  if(!dlg||!txt) return;
  txt.textContent=text;
  dlg.style.opacity='1';
  clearTimeout(act7._sonDlgTimer);
  act7._sonDlgTimer=setTimeout(()=>{dlg.style.opacity='0';},3000);
}

// 大娘儿子表情切换
function act7ShowSon(expr){
  const wrap=qs('act7-son-wrap');
  if(!wrap) return;
  wrap.style.opacity='1';
  ['appear','doubt','joy','tears'].forEach(e=>{
    const el=qs(`act7-son-${e}`);
    if(el) el.style.display=(e===expr?'block':'none');
  });
}

const symbolColors=['#ff8c00','#80ff80','#8080ff','#ff4040','#80c8ff','#ffd040'];
function spawnSymbolPetals(n){
  const count=20+n*8;
  for(let i=0;i<count;i++){
    act7.petalParticles.push({
      x:W()*.5+(Math.random()-.5)*W()*.4,
      y:H()*.5+(Math.random()-.5)*H()*.4,
      vx:(Math.random()-.5)*2,vy:-(1+Math.random()*2),
      r:4+Math.random()*8,
      color:symbolColors[Math.min(n-1,symbolColors.length-1)],
      life:1,decay:.006+Math.random()*.006,
      rot:Math.random()*Math.PI*2,spin:( Math.random()-.5)*.1
    });
  }
}

function updateAct7(progress,sy){
  // s7-sky/crowd canvas已隐藏，PNG提供背景
  parallax(7,sy);

  // 轨迹canvas：实时绘制画圈轨迹
  const tc=qs('act7-trail-canvas');
  if(tc){
    if(tc.width!==W()||tc.height!==H()){tc.width=W();tc.height=H();}
    const tctx=tc.getContext('2d');
    tctx.clearRect(0,0,tc.width,tc.height);
    const pts=act7.trailPoints;
    if(pts.length>2){
      tctx.lineCap='round';tctx.lineJoin='round';
      const flash=act7._trailFlash;
      for(let i=1;i<pts.length;i++){
        const progress=(i/pts.length);
        const alpha=progress*(flash?.9:.55);
        const color=flash
          ?`rgba(255,255,255,${alpha})`
          :`rgba(255,210,80,${alpha})`;
        const width=flash?5:2.5+progress*2;
        tctx.strokeStyle=color;
        tctx.lineWidth=width;
        tctx.beginPath();
        tctx.moveTo(pts[i-1].x,pts[i-1].y);
        tctx.lineTo(pts[i].x,pts[i].y);
        tctx.stroke();
      }
      // 轨迹头部光点
      if(!flash){
        const last=pts[pts.length-1];
        const glow=tctx.createRadialGradient(last.x,last.y,0,last.x,last.y,12);
        glow.addColorStop(0,'rgba(255,220,80,.7)');
        glow.addColorStop(1,'rgba(255,180,0,0)');
        tctx.fillStyle=glow;
        tctx.beginPath();tctx.arc(last.x,last.y,12,0,Math.PI*2);tctx.fill();
      }
    }
  }

  // 人群欢呼（简单粒子）
  const cc=qs('s7-crowd');
  if(cc){
    const cctx=cc.getContext('2d');
    cctx.clearRect(0,0,cc.width,cc.height);
    // 旗帜挥动
    const flagCount=8;
    for(let i=0;i<flagCount;i++){
      const fx=lerp(.1,.9,i/(flagCount-1))*cc.width;
      const fy=H()*.55+Math.sin(Date.now()*.002+i)*10;
      cctx.strokeStyle='rgba(180,20,20,.7)';cctx.lineWidth=2;
      cctx.beginPath();cctx.moveTo(fx,fy);cctx.lineTo(fx,fy-40);cctx.stroke();
      cctx.fillStyle='rgba(200,30,30,.75)';
      const wave=Math.sin(Date.now()*.003+i);
      cctx.beginPath();
      cctx.moveTo(fx,fy-40);
      cctx.quadraticCurveTo(fx+15+wave*5,fy-32,fx+25,fy-25);
      cctx.quadraticCurveTo(fx+15+wave*5,fy-18,fx,fy-25);
      cctx.fill();
    }
  }

  // 花瓣雨
  const pc=qs('s7-petals');
  if(pc){
    const pctx=pc.getContext('2d');
    pctx.clearRect(0,0,pc.width,pc.height);
    act7.petalParticles=act7.petalParticles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.02;p.rot+=p.spin;p.life-=p.decay;
      if(p.life<=0) return false;
      pctx.save();pctx.translate(p.x,p.y);pctx.rotate(p.rot);pctx.globalAlpha=p.life*.8;
      pctx.fillStyle=p.color;
      pctx.beginPath();pctx.ellipse(0,0,p.r,p.r*.5,0,0,Math.PI*2);pctx.fill();
      pctx.restore();pctx.globalAlpha=1;
      return true;
    });
  }

  // 去掉回忆闪现（原memoryPlayed逻辑删除）

  // 进度节点
  if(progress>.04&&!act7.sub0){act7.sub0=true;
    showSub('两年前我不知道什么叫长征。','narrate');}
  if(progress>.12&&!act7.sub0b){act7.sub0b=true;
    showSub('现在我知道了。','narrate');}
  if(progress>.20&&!act7.sub1){act7.sub1=true;
    showSub('在人群里，我找一个人。','narrate');}
  if(progress>.28&&!act7.sub1b){act7.sub1b=true;
    showSub('忽地，我看见一张似曾相识的面孔。','narrate');
    act7ShowSon('appear');
  }
  if(progress>.36&&!act7.sub1c){act7.sub1c=true;
    showSub('他的眉眼……与那个送我鸡蛋的大娘有几分相似。','narrate');
    act7ShowSon('doubt');
  }
  if(progress>.43&&!act7.sub1a){act7.sub1a=true;
    showSub('他——大娘的娃，还活着！','narrate');}
  if(progress>.50&&!act7.sub1d){act7.sub1d=true;
    showSub('他慢慢向我走来，眼神从犹疑变得惊喜。','narrate');
    act7ShowSon('joy');
    setTimeout(()=>{
      const nameEl=qs('act7-son-name');
      if(nameEl) nameEl.style.opacity='1';
    },800);
  }
  if(progress>.57&&!act7.sub1e){act7.sub1e=true;
    act7SonSay('……是你？');}
  if(progress>.63&&!act7.sub2){act7.sub2=true;
    showPlayerDialog('哥……我……我把鸡蛋……带回来了。');
    setTimeout(()=>hidePlayerDialog(),4000);
  }
  if(progress>.70&&!act7.sub3){act7.sub3=true;
    act7ShowSon('tears');
    act7SonSay('傻子，鸡蛋早该吃了。');
  }
  if(progress>.76&&!act7.sub3b){act7.sub3b=true;
    act7SonSay('活着就好，活着就好……');}  
  if(progress>.83&&!act7.sub4){act7.sub4=true;
    showSub('我们没有说话，只是哭。','narrate');}
  if(progress>.90&&!act7.sub5){act7.sub5=true;
    showSub('我们赢了。','narrate');}
  if(progress>.95&&!act7.finalShown){
    act7.finalShown=true;
    showAct7Final();
  }
}

// 第七幕最终画面：星空背景+逐句渐显
function showAct7Final(){
  const ft=qs('act7-final-text');
  ft.classList.add('show');
  // 启动星星动画（复用intro-stars逻辑）
  const sc=qs('act7-final-stars');
  if(sc){
    sc.width=window.innerWidth;sc.height=window.innerHeight;
    const sctx=sc.getContext('2d');
    const stars=Array.from({length:120},()=>({
      x:Math.random()*sc.width,y:Math.random()*sc.height,
      r:.5+Math.random()*1.5,a:Math.random(),da:(Math.random()-.5)*.01
    }));
    function drawStars(){
      if(!qs('act7-final-text').classList.contains('show')) return;
      sctx.clearRect(0,0,sc.width,sc.height);
      stars.forEach(s=>{
        s.a=Math.max(0.05,Math.min(1,s.a+s.da));
        if(s.a<=0.05||s.a>=1) s.da*=-1;
        sctx.fillStyle=`rgba(255,255,255,${s.a})`;
        sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();
  }
  // 逐句渐显
  const lines=['fl0','fl1','fl2','fl3','fl4','fl-dedication'];
  const delays=[800,2200,3800,5000,6200,8000];
  lines.forEach((id,i)=>{
    setTimeout(()=>{
      const el=qs(id);if(el) el.classList.add('show');
    },delays[i]);
  });
  // 全部显示后进入结尾
  setTimeout(()=>showEnding(),10500);
}


let mainStarted=false;
function startMainLoop(){
  if(mainStarted) return;
  mainStarted=true;
  function tick(){
    if(phase!=='main'){requestAnimationFrame(tick);return;}
    // Act1 使用阶段驱动，不需要progress
    if(currentAct===1){
      updateAct1();
    } else {
      scrollY=lerp(scrollY,targetScrollY,.08);
      const progress=scrollY/SCROLL_PER_ACT;
      qs('progress-bar').style.width=(progress*100)+'%';
      ({2:updateAct2,3:updateAct3,4:updateAct4,
        5:updateAct5,6:updateAct6,7:updateAct7}[currentAct]||function(){})(progress,scrollY);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ══════════════════════════════════════════════════════════
   结尾 / 游戏B
══════════════════════════════════════════════════════════ */
function showEnding(){
  const mask=qs('global-mask');
  mask.style.opacity='1';
  setTimeout(()=>{
    qs('main').style.display='none';
    const end=qs('ending');end.style.display='flex';
    mask.style.opacity='0';
    setTimeout(()=>{
      qs('ending-text').classList.add('show');
      setTimeout(()=>qs('ending-btns').classList.add('show'),800);
    },300);
  },700);
}
function openGameB(){
  const wrap=qs('game-b-wrap');wrap.style.display='flex';
}
function closeGameB(){
  qs('game-b-wrap').style.display='none';
}
function restartStory(){
  const mask=qs('global-mask');
  mask.style.opacity='1';
  setTimeout(()=>{
    // 隐藏结尾
    qs('ending').style.display='none';
    // 完整清理第七幕final-text
    const ft=qs('act7-final-text');
    ft.classList.remove('show');
    ['fl0','fl1','fl2','fl3','fl4','fl-dedication'].forEach(id=>{
      const el=qs(id);if(el) el.classList.remove('show');
    });
    // 清理所有幕的残留状态
    cleanupAct(currentAct);
    hideAllSubs();
    hidePlayerDialog();
    resetSubtitles();
    // 重置滚动和phase
    scrollY=0;targetScrollY=0;currentAct=1;mainStarted=false;
    // 显示intro
    qs('intro').style.display='flex';
    qs('intro').style.opacity='1';
    phase='intro';
    mask.style.opacity='0';
  },700);
}

/* ══════════════════════════════════════════════════════════
   横屏检测（手机竖屏时显示提示，电脑端完全不触发）
══════════════════════════════════════════════════════════ */
function checkRotate(){
  const tip=document.getElementById('rotate-tip');
  if(!tip) return;
  // 严格判断：必须同时满足触屏+屏幕物理宽度≤768px才视为手机
  const isPhone=navigator.maxTouchPoints>0 && window.screen.width<=768;
  if(!isPhone){ tip.style.display='none'; return; }
  const isPortrait=window.innerHeight>window.innerWidth;
  tip.style.display=isPortrait?'flex':'none';
}
// 页面加载完成后延迟检测，避免误触发
window.addEventListener('load',()=>setTimeout(checkRotate,500));
window.addEventListener('orientationchange',()=>setTimeout(checkRotate,300));
window.addEventListener('resize',checkRotate);
