<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>征途·戍行录</title>
<style>
/* ══════════════════════════════════════════════
   全局基础
══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --c-bg:#080612;
  --c-text:#f0e6c8;
  --c-torch:#ff8c00;
  --c-torch2:#ffcc44;
  --c-river:#0a1828;
  --c-snow:#d8e8f0;
  --c-red:#cc2222;
  --c-gold:#d4a843;
  --font-pixel:'Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--c-bg);
  font-family:var(--font-pixel);cursor:none;color:var(--c-text)}

/* 自定义光标 */
#cursor{position:fixed;width:8px;height:8px;border:1.5px solid rgba(255,200,80,.8);
  border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
  mix-blend-mode:screen;transition:width .15s,height .15s}

/* 噪点层 */
#noise{position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:120px 120px}

/* 全局转场遮罩 */
#global-mask{position:fixed;inset:0;z-index:8000;pointer-events:none;
  background:#080612;opacity:0;transition:opacity .6s ease}

/* ══════════════════════════════════════════════
   开头：梦境层
══════════════════════════════════════════════ */
#intro{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#080612;
  transition:opacity 1.5s ease}
#intro-fog{position:absolute;inset:0;overflow:hidden}
.fog-layer{position:absolute;inset:-20%;width:140%;height:140%;
  border-radius:50%;opacity:.18;animation:fogDrift 12s ease-in-out infinite}
.fog-layer:nth-child(1){background:radial-gradient(ellipse,#2a1840 0%,transparent 70%);
  animation-duration:14s;animation-delay:0s}
.fog-layer:nth-child(2){background:radial-gradient(ellipse,#1a2840 0%,transparent 65%);
  animation-duration:18s;animation-delay:-5s;left:-10%}
.fog-layer:nth-child(3){background:radial-gradient(ellipse,#101830 0%,transparent 60%);
  animation-duration:22s;animation-delay:-9s;top:-10%}
@keyframes fogDrift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(3%,2%) scale(1.04)}
  66%{transform:translate(-2%,3%) scale(.97)}
}
#intro-stars{position:absolute;inset:0;pointer-events:none}
#intro-text{position:relative;z-index:2;text-align:center;
  font-size:clamp(14px,1.8vw,20px);letter-spacing:.35em;line-height:2.8;
  color:rgba(240,230,200,.75);text-shadow:0 0 30px rgba(200,180,255,.3)}
#intro-text .line{opacity:0;transform:translateY(10px);
  transition:opacity 1.2s ease,transform 1.2s ease}
#intro-text .line.show{opacity:1;transform:translateY(0)}
#intro-enter{margin-top:40px;position:relative;z-index:2;
  font-size:15px;letter-spacing:.45em;color:rgba(240,230,200,.4);
  animation:pulse 2.2s ease-in-out infinite;cursor:pointer}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.85;transform:scale(1.06)}}

/* ══════════════════════════════════════════════
   游戏A容器
══════════════════════════════════════════════ */
#game-a-wrap{position:fixed;inset:0;z-index:600;background:#080612;
  display:none} /* 不用flex-column，iframe直接全屏 */
#game-a-header{
  position:absolute;top:0;left:0;right:0;
  height:38px;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:linear-gradient(to bottom,rgba(5,6,10,.85) 0%,rgba(5,6,10,0) 100%);
  pointer-events:none; /* 让鼠标事件穿透到游戏 */
}
#game-a-header *{pointer-events:auto;} /* 按钮仍然可点 */
#game-a-header span{font-size:10px;letter-spacing:.35em;opacity:.35}
#game-a-skip{font-size:10px;letter-spacing:.25em;color:rgba(240,230,200,.4);
  cursor:pointer;border:1px solid rgba(240,230,200,.2);padding:4px 14px;
  border-radius:2px;transition:all .3s;background:none}
#game-a-skip:hover{color:rgba(240,230,200,.8);border-color:rgba(240,230,200,.5)}
#game-a-menu{font-size:10px;letter-spacing:.25em;color:rgba(240,230,200,.3);
  cursor:pointer;border:1px solid rgba(240,230,200,.15);padding:4px 14px;
  border-radius:2px;transition:all .3s;background:none}
#game-a-menu:hover{color:rgba(240,230,200,.7);border-color:rgba(240,230,200,.45)}
#game-a-iframe{
  position:absolute;inset:0;
  border:none;width:100%;height:100%;
  background:#080612;
}

/* ══════════════════════════════════════════════
   正片容器
══════════════════════════════════════════════ */
#main{position:fixed;inset:0;z-index:100;display:none}

/* 每一幕：全屏固定，默认隐藏 */
.scene{position:absolute;inset:0;overflow:hidden;opacity:0;
  pointer-events:none;transition:opacity .3s}
.scene.active{opacity:1;pointer-events:auto}

/* 视差图层 */
.p-layer{position:absolute;inset:0;will-change:transform}

#act-label{position:fixed;top:28px;left:50%;transform:translateX(-50%);
  font-size:clamp(14px,1.6vw,17px);letter-spacing:.4em;color:rgba(240,230,200,.55);
  z-index:300;pointer-events:none;transition:opacity .8s}

/* ══════════════════════════════════════════════
   旁白字幕系统：屏幕底部半透明黑底渐变条
══════════════════════════════════════════════ */
#subtitle-wrap{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:300;pointer-events:none;
  background:linear-gradient(to top,
    rgba(0,0,0,.80) 0%,
    rgba(0,0,0,.62) 45%,
    rgba(0,0,0,0)   100%);
  padding:42px 40px 28px;
  min-height:115px;
  transition:opacity .5s ease;
}
/* 每行旁白 */
.sub-line{
  display:block;
  font-size:clamp(17px,2.2vw,22px);
  color:var(--c-text);
  letter-spacing:.14em;
  line-height:2;
  text-align:center;
  opacity:0;
  transition:opacity .8s ease;
  margin-bottom:2px;
}
.sub-line.visible{opacity:1}
/* 旁白：米白居中 */
.sub-line.narrate{color:#e8dfc0;text-align:center}
/* 主角对话（出现在对话框里，不走字幕条） */
.sub-line.player{color:#a8d4f0;text-align:left}
/* NPC对话（出现在对话框里，不走字幕条） */
.sub-line.npc{color:#f0d880;text-align:left}
/* 角色名标签 */
.sub-speaker{font-size:.82em;opacity:.65;margin-right:.4em;
  letter-spacing:.05em;font-style:normal}

/* ── 主角对话框（横条形，字幕条上方，主角有台词时渐显） ── */
#player-dialog{
  position:fixed;
  bottom:125px;
  left:50%;
  transform:translateX(-50%);
  z-index:302;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(120,180,240,.28);
  border-radius:4px;
  padding:12px 32px;
  font-size:clamp(17px,1.9vw,20px);
  letter-spacing:.18em;
  line-height:1.9;
  color:#a8d4f0;
  text-align:center;
  pointer-events:none;
  opacity:0;
  transition:opacity .5s ease;
  max-width:70vw;
  white-space:normal;
}
#player-dialog.show{opacity:1}

/* ── 提示系统 ── */
#hint-wrap{position:fixed;bottom:125px;left:50%;transform:translateX(-50%);
  z-index:301;pointer-events:none;display:flex;flex-direction:column;
  align-items:center;gap:5px;transition:opacity .8s;
  background:rgba(0,0,0,.38);padding:6px 18px 8px;border-radius:4px;}
#hint-text{font-size:16px;letter-spacing:.22em;color:rgba(255,245,210,.95);
  text-shadow:0 1px 4px rgba(0,0,0,.8)}
#hint-icon{width:20px;height:20px;border-right:2px solid rgba(240,230,200,.6);
  border-bottom:2px solid rgba(240,230,200,.6);transform:rotate(45deg);
  animation:hintBounce 1.5s infinite ease-in-out}
@keyframes hintBounce{0%,100%{transform:rotate(45deg) translateY(0)}
  50%{transform:rotate(45deg) translateY(4px)}}
/* 横向滑动提示：双箭头左右抖动 */
#hint-icon.swipe-hint{
  width:28px;height:12px;
  border:none;
  border-left:2px solid rgba(240,230,200,.6);
  border-right:2px solid rgba(240,230,200,.6);
  transform:none;
  animation:hintSwipe 1.2s infinite ease-in-out;
}
@keyframes hintSwipe{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(5px)}
}

/* ── 进度条（开发调试用，上线可删） ── */
#progress-bar{position:fixed;top:0;left:0;height:1.5px;
  background:linear-gradient(90deg,var(--c-torch),var(--c-torch2));
  z-index:9000;transition:width .12s linear;opacity:.4;pointer-events:none}

/* ══════════════════════════════════════════════
   转场遮罩（每幕专用）
══════════════════════════════════════════════ */
#scene-mask{position:fixed;inset:0;z-index:700;pointer-events:none;
  opacity:0;transition:opacity .3s}

/* ══════════════════════════════════════════════
   第一幕专属
══════════════════════════════════════════════ */

/* PNG图层通用：铺满容器，底部对齐，透明PNG直接叠加 */
.s1-img,.s2-img,.s3-img{
  position:absolute;
  left:0;bottom:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center bottom;
  pointer-events:none;
}

/* 芦苇摇晃动画 */
@keyframes reedsWave{
  0%  {transform:rotate(0deg) translateX(0)}
  25% {transform:rotate(.6deg) translateX(2px)}
  75% {transform:rotate(-.5deg) translateX(-2px)}
  100%{transform:rotate(0deg) translateX(0)}
}
#s1-reeds{
  transform-origin:bottom center;
  animation:reedsWave 4s ease-in-out infinite;
}

/* 村庄灯光呼吸闪烁 */
@keyframes villageGlow{
  0%,100%{filter:brightness(1) drop-shadow(0 0 0px rgba(255,180,60,0))}
  50%    {filter:brightness(1.08) drop-shadow(0 0 8px rgba(255,180,60,.18))}
}
#s1-village{
  animation:villageGlow 3.5s ease-in-out infinite;
}

/* 月亮光晕呼吸 */
@keyframes moonGlow{
  0%,100%{filter:brightness(1) drop-shadow(0 0 12px rgba(255,240,180,.3))}
  50%    {filter:brightness(1.06) drop-shadow(0 0 28px rgba(255,240,180,.55))}
}
#s1-sky{
  animation:moonGlow 5s ease-in-out infinite;
}

/* 芦苇摇晃动画 */
@keyframes reedSway{
  0%,100%{transform:rotate(0deg) translateX(0);}
  25%{transform:rotate(.8deg) translateX(3px);}
  75%{transform:rotate(-.6deg) translateX(-2px);}
}
#s1-reeds{
  transform-origin:bottom center;
  animation:reedSway 4.5s ease-in-out infinite;
}

/* 动效Canvas层（月亮倒影荡漾+光晕粒子） */
#s1-fx-canvas{
  position:absolute;
  inset:0;
  z-index:9;
  pointer-events:none;
  width:100%;height:100%;
}

/* 云朵层 */
#s1-clouds{
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.s1-cloud{
  position:absolute;
  border-radius:50%;
  filter:blur(18px);
  opacity:.07;
  animation:cloudDrift linear infinite;
}
@keyframes cloudDrift{
  from{transform:translateX(-200px);}
  to{transform:translateX(calc(100vw + 200px));}
}

/* 大娘剪影——屏幕正中央，占画面约85%高度 */
#s1-grandma-wrap{
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-52%);
  width:min(900px,75vw);
  z-index:20;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
  display:flex;flex-direction:column;align-items:center;
}
#s1-grandma-wrap.show{opacity:1}
#s1-grandma-svg{
  width:100%;height:auto;display:block;
}

/* 大娘对话框：出现在剪影左侧，不遮挡底部字幕条 */
#s1-grandma-dialog{
  position:fixed;
  /* 水平：剪影左侧；垂直：屏幕中央偏下一点 */
  left:calc(50% - min(140px,16vw) - 260px);
  top:55%;
  transform:translateY(-50%);
  background:rgba(8,5,2,.88);
  border:1px solid rgba(255,175,70,.35);
  border-radius:4px 4px 4px 0;
  padding:16px 20px 20px;
  font-size:17px;
  letter-spacing:.14em;
  line-height:1.9;
  width:280px;
  z-index:350;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
/* 右侧小三角（指向剪影） */
#s1-grandma-dialog::after{
  content:'';position:absolute;
  right:-8px;top:18px;
  border-top:7px solid transparent;
  border-bottom:7px solid transparent;
  border-left:8px solid rgba(255,175,70,.35);
}
#s1-grandma-dialog.show{opacity:1}
#s1-grandma-dialog .spk{color:#f0d880;font-size:15px;opacity:.7;
  display:block;margin-bottom:4px}
#s1-grandma-dialog .txt{color:#f0d898}

/* 鸡蛋交接场景 */
/* ══ 鸡蛋交接场景 ══ */
#egg-scene{
  position:fixed;inset:0;z-index:400;pointer-events:none;
  opacity:0;transition:opacity .8s ease;
  background:#080612;
}
#egg-scene.active{opacity:1}

/* 大娘全身：全屏铺满 */
#egg-grandma-img{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  opacity:0;transition:opacity .8s ease;
}
#egg-grandma-img.show{opacity:1}

/* 主角的手：全屏铺满，从下方升起 */
#egg-player-hand{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  opacity:0;
  transform:translateY(5vh);
  transition:opacity .7s ease, transform 1s cubic-bezier(.25,.46,.45,.94);
}
#egg-player-hand.show{
  opacity:1;
  transform:translateY(0);
}

/* 大娘的手：全屏铺满，从上方降下，z-index高于主角手 */
#egg-grandma-hand{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  opacity:0;
  transform:translateY(-5vh);
  transition:opacity .7s ease, transform 1.1s cubic-bezier(.25,.46,.45,.94);
  z-index:3;
}
#egg-grandma-hand.show{
  opacity:1;
  transform:translateY(0);
}
/* 大娘手完全盖住主角手 */
#egg-grandma-hand.cover{transform:translateY(2vh)}
/* 大娘手挪开退场 */
#egg-grandma-hand.retract{
  transform:translateY(-15vh);
  opacity:0;
  transition:opacity .9s ease, transform 1.2s cubic-bezier(.55,.06,.68,.19);
}

/* 鸡蛋：全屏，和主角手同一张图，大娘手挪开后淡入
   注意：这张图包含主角的手+鸡蛋，z-index高于主角空手 */
#egg-item{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  opacity:0;
  transition:opacity 1s ease;
  z-index:2;
}
#egg-item.show{opacity:1}

/* 上一幕按钮（左上角） */
#prev-act-btn{
  position:fixed;top:22px;left:20px;z-index:500;
  font-size:14px;letter-spacing:.25em;color:rgba(240,230,200,.35);
  background:none;border:1px solid rgba(240,230,200,.15);
  padding:7px 16px;border-radius:2px;cursor:pointer;
  transition:all .3s;font-family:var(--font-pixel);
  opacity:0;pointer-events:none;
}
#prev-act-btn.show{opacity:1;pointer-events:auto}
#prev-act-btn:hover{color:rgba(240,230,200,.75);border-color:rgba(240,230,200,.4)}

/* 下一幕按钮（上一幕按钮右边） */
#next-act-btn{
  position:fixed;top:22px;left:148px;z-index:500;
  font-size:14px;letter-spacing:.25em;color:rgba(240,230,200,.35);
  background:none;border:1px solid rgba(240,230,200,.15);
  padding:7px 16px;border-radius:2px;cursor:pointer;
  transition:all .3s;font-family:var(--font-pixel);
  opacity:0;pointer-events:none;
}
#next-act-btn.show{opacity:1;pointer-events:auto}
#next-act-btn:hover{color:rgba(240,230,200,.75);border-color:rgba(240,230,200,.4)}

/* 返回主页按钮（右上角） */
#skip-dialog-btn{
  position:fixed;top:22px;right:20px;z-index:500;
  font-size:14px;letter-spacing:.25em;color:rgba(240,230,200,.3);
  background:none;border:1px solid rgba(240,230,200,.12);
  padding:7px 18px;border-radius:2px;cursor:pointer;
  transition:all .3s;font-family:var(--font-pixel);
  opacity:0;pointer-events:none;
}
#skip-dialog-btn.show{opacity:1;pointer-events:auto}
#skip-dialog-btn:hover{color:rgba(240,230,200,.65);border-color:rgba(240,230,200,.35)}

/* ══════════════════════════════════════════════
   第二幕专属：识字课本
══════════════════════════════════════════════ */
/* 识字课本：政委右侧 */
#act2-book{
  position:fixed;
  top:50%;
  left:62%;   /* 政委在35%，课本在右侧62% */
  transform:translate(-50%,-50%);
  z-index:350;opacity:0;transition:opacity .9s;pointer-events:none;
}
#act2-book.show{opacity:1}
#act2-book img{
  height:40vh;width:auto;display:block;
}
/* 泥地写字画布 */
#act2-mud-canvas{position:fixed;bottom:0;left:0;width:100%;height:35%;
  z-index:340;pointer-events:none;opacity:0;transition:opacity .8s}
#act2-mud-canvas.show{opacity:1}

/* ══════════════════════════════════════════════
   第三幕专属：静夜思课本（PNG素材）
══════════════════════════════════════════════ */
#act3-book{
  position:fixed;
  right:12vw;
  bottom:10%;
  z-index:350;
  opacity:0;
  transition:opacity .9s ease, transform .9s ease;
  pointer-events:none;
  transform:translateX(30px);
}
#act3-book.show{opacity:1;transform:translateX(0)}
#act3-book img{
  height:54vh;
  width:auto;
  display:block;
}
/* 泪滴Canvas */
#act3-tear-canvas{position:fixed;right:6vw;top:50%;
  z-index:351;pointer-events:none;opacity:0;transition:opacity .5s}
#act3-tear-canvas.show{opacity:1}

/* ══════════════════════════════════════════════
   第三幕专属：老兵（PNG素材，左侧偏下）
══════════════════════════════════════════════ */
#act3-oldman-wrap{
  position:fixed;
  left:12vw;
  bottom:6%;
  transform:none;
  z-index:350;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  opacity:0;
  transition:opacity 1.2s ease;
}
#act3-oldman-wrap.show{opacity:1}
#act3-oldman-wrap img{
  height:68vh;
  width:auto;
  display:block;
}

/* ── 通用：人物剪影定位辅助（对话框上方） ── */
.char-wrap{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-55%);
  z-index:350;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;
  transition:opacity 1.2s ease;
}
.char-wrap.show{opacity:1}

/* 第二幕：政委居中偏左，课本在其右侧 */
#act2-commissar-wrap{
  left:42%;
  transform:translate(-50%,-55%);
}
/* 政委对话框：人物左侧，不遮挡政委 */
#act2-commissar-dialog{
  left:calc(42% - 360px);
  top:42%;
  transform:none;
}
/* 通用对话框：固定在剪影左侧中间位置，不遮字幕条 */
.char-dialog{
  position:fixed;
  left:calc(50% - min(80px,10vw) - 240px);
  top:50%;
  transform:translateY(-50%);
  background:rgba(8,5,2,.92);
  border:1px solid rgba(255,175,70,.32);
  border-radius:4px 4px 4px 0;
  padding:18px 22px 22px;
  font-size:19px;
  letter-spacing:.14em;
  line-height:2;
  width:300px !important;
  word-break:normal;
  word-wrap:break-word;
  white-space:normal;
  z-index:355;

<script>
/* ══════════════════════════════════════════════════════════
   工具函数
══════════════════════════════════════════════════════════ */
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const easeOut=t=>1-Math.pow(1-t,3);
const easeOut5=t=>1-Math.pow(1-t,5);
const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const W=()=>window.innerWidth;
const H=()=>window.innerHeight;
const qs=id=>document.getElementById(id);

/* ══════════════════════════════════════════════════════════
   光标
══════════════════════════════════════════════════════════ */
let mx=W()/2,my=H()/2;
const cursorEl=qs('cursor');
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  if(cursorEl){cursorEl.style.left=mx+'px';cursorEl.style.top=my+'px';}
});

/* ══════════════════════════════════════════════════════════
   全局状态
══════════════════════════════════════════════════════════ */
let phase='intro';
let currentAct=1;
let scrollY=0,targetScrollY=0;
const SCROLL_PER_ACT=1400;
const TOTAL_ACTS=7;

/* ══════════════════════════════════════════════════════════
   开头星空
══════════════════════════════════════════════════════════ */
(function initIntroStars(){
  try{
    const c=qs('intro-stars');
    if(!c) return;
    c.style.cssText='position:absolute;inset:0;pointer-events:none';
    function resize(){c.width=W();c.height=H();}
    resize();window.addEventListener('resize',resize);
    const stars=Array.from({length:180},()=>({
      x:Math.random(),y:Math.random()*.7,
      r:.3+Math.random()*1.1,o:.2+Math.random()*.5,
      ph:Math.random()*Math.PI*2,sp:.005+Math.random()*.012
    }));
    function draw(){
      const ctx=c.getContext('2d');
      ctx.clearRect(0,0,c.width,c.height);
      stars.forEach(s=>{
        s.ph+=s.sp;
        ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(220,230,255,${s.o*(0.6+0.4*Math.sin(s.ph))})`;
        ctx.fill();
      });
      if(phase==='intro') requestAnimationFrame(draw);
    }
    draw();
  }catch(e){console.warn('initIntroStars error:',e);}
})();

/* ══════════════════════════════════════════════════════════
   开头文字序列
══════════════════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  const delays=[400,1200,2100,3000];
  ['iline0','iline1','iline2','iline3'].forEach((id,i)=>{
    setTimeout(()=>qs(id)?.classList.add('show'),delays[i]);
  });
});

/* ══════════════════════════════════════════════════════════
   进入游戏A
══════════════════════════════════════════════════════════ */
function enterGameA(){
  const mask=qs('global-mask');
  mask.style.opacity='1';
  setTimeout(()=>{
    qs('intro').style.display='none';
    const wrap=qs('game-a-wrap');
    // 每次进入都重新加载iframe，防止restart后src变成about:blank
    const iframe=qs('game-a-iframe');
    if(iframe&&(iframe.src==='about:blank'||!iframe.src||iframe.src==='')){
      iframe.src='game_a.html';
    }
    wrap.style.display='flex';
    phase='game-a';
    mask.style.opacity='0';
  },700);
}

/* ══════════════════════════════════════════════════════════
   跳过游戏A / 游戏A通关 → 进入正片
   在游戏A的HTML里，通关时调用：
     window.parent.postMessage('gameA_complete','*')
══════════════════════════════════════════════════════════ */
function skipGameA(){ enterMain(); }

// 返回选关：向iframe发消息，让游戏回到选关菜单
function returnGameAMenu(){
  const iframe=qs('game-a-iframe');
  if(iframe&&iframe.contentWindow){
    try{
      iframe.contentWindow.backToMenu(); // 直接调用游戏内函数
    }catch(e){
      // 跨域时用postMessage
      iframe.contentWindow.postMessage('backToMenu','*');
    }
  }
}
window.addEventListener('message',e=>{
  if(e.data==='gameA_complete') enterMain();
});

function enterMain(){
  const mask=qs('global-mask');
  mask.style.opacity='1';
  setTimeout(()=>{
    // intro 숨기기 (직접 enterMain 호출 시에도 동작하도록)
    qs('intro').style.display='none';
    // 彻底停止游戏：清空iframe src，终止所有音效
    const iframe=qs('game-a-iframe');
    if(iframe){
      iframe.src='about:blank';
    }
    qs('game-a-wrap').style.display='none';
    qs('main').style.display='block';
    phase='main';
    currentAct=1;
    activateScene(1);
    mask.style.opacity='0';
    startMainLoop();
  },800);
}

/* ══════════════════════════════════════════════════════════
   场景激活
══════════════════════════════════════════════════════════ */
function activateScene(n){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  qs(`scene-${n}`)?.classList.add('active');
  const labels=['','第一幕 · 夜渡于都河','第二幕 · 草地沼泽',
    '第三幕 · 四渡赤水','第四幕 · 激战娄山关',
    '第五幕 · 飞夺泸定桥','第六幕 · 夹金山','第七幕 · 会宁会师'];
  qs('act-label').textContent=labels[n]||'';
  resetSubtitles();
  resetHints(n);
  // 上一幕按钮：第一幕不显示，其他幕显示
  const prevBtn=qs('prev-act-btn');
  if(n>1) prevBtn.classList.add('show');
  else prevBtn.classList.remove('show');
  // 下一幕按钮：第七幕不显示，其他幕显示
  const nextBtn=qs('next-act-btn');
  if(n<TOTAL_ACTS) nextBtn.classList.add('show');
  else nextBtn.classList.remove('show');
  // 跳过按钮：所有幕显示
  qs('skip-dialog-btn').classList.add('show');
  ({1:initAct1,2:initAct2,3:initAct3,4:initAct4,
    5:initAct5,6:initAct6,7:initAct7}[n]||function(){})();
}

/* ══════════════════════════════════════════════════════════
   字幕系统
══════════════════════════════════════════════════════════ */
function resetSubtitles(){
  const wrap=qs('subtitle-wrap');
  wrap.innerHTML='';
  hidePlayerDialog();
}
/* ══════════════════════════════════════════════
   字幕系统
   - narrate：旁白，进入底部字幕条（半透明黑底）
   - player/npc：对话，不进字幕条（由各幕对话框处理）
══════════════════════════════════════════════ */
function showSub(text,type='narrate',speaker='',delay=0){
  // 只有旁白进入字幕条
  if(type!=='narrate') return null;
  const wrap=qs('subtitle-wrap');
  // 清除旧字幕（最多保留2句）
  const existing=wrap.querySelectorAll('.sub-line');
  if(existing.length>=2){
    const oldest=existing[0];
    oldest.style.opacity='0';
    setTimeout(()=>oldest.remove(),800);
  }
  const el=document.createElement('span');

/* ══════════════════════════════════════════════════════════
   输入系统（分发给当前幕处理）
══════════════════════════════════════════════════════════ */
let touchStartY=0;
const ACT_SCROLL_HANDLERS={
  1: d=>handleAct1Scroll(d),
  4: d=>handleAct4Scroll(d),
  5: d=>handleAct5Scroll(d),
  7: d=>handleAct7Scroll(d),
  // 2-7在各自幕里定义，这里用默认的progress驱动
};
function handleAct7Scroll(delta){
  // 画圈未完成前，progress锁在15%
  const LOCK=Math.floor(SCROLL_PER_ACT*0.15);
  if(delta<0){
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
    if(targetScrollY<=0&&currentAct>1){
      if(!dispatchScroll._upAcc) dispatchScroll._upAcc=0;
      dispatchScroll._upAcc+=Math.abs(delta);
      if(dispatchScroll._upAcc>400){dispatchScroll._upAcc=0;switchToAct(currentAct-1);}
    } else {dispatchScroll._upAcc=0;}
    return;
  }
  dispatchScroll._upAcc=0;
  if(act7.circleCount<1){
    targetScrollY=clamp(targetScrollY+delta*.65,0,LOCK);
  } else {
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
  }
}
function handleAct5Scroll(delta){
  // 火把未全亮前，progress锁在10%（防止滑动点火把时progress跑飞）
  const LOCK=Math.floor(SCROLL_PER_ACT*0.10);
  if(delta<0){
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
    if(targetScrollY<=0&&currentAct>1){
      if(!dispatchScroll._upAcc) dispatchScroll._upAcc=0;
      dispatchScroll._upAcc+=Math.abs(delta);
      if(dispatchScroll._upAcc>400){dispatchScroll._upAcc=0;switchToAct(currentAct-1);}
    } else {dispatchScroll._upAcc=0;}
    return;
  }
  dispatchScroll._upAcc=0;
  if(act5.torchLit<13){
    // 火把未全亮：锁在10%
    targetScrollY=clamp(targetScrollY+delta*.65,0,LOCK);
  } else {
    // 全亮后：正常推进
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
  }
}
function handleAct4Scroll(delta){
  // 滑动交互完成前，progress锁在30%（0.30 * 1400 = 420）
  const LOCK=420;
  if(delta<0){
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
    if(targetScrollY<=0&&currentAct>1){
      if(!dispatchScroll._upAcc) dispatchScroll._upAcc=0;
      dispatchScroll._upAcc+=Math.abs(delta);
      if(dispatchScroll._upAcc>400){dispatchScroll._upAcc=0;switchToAct(currentAct-1);}
    } else {dispatchScroll._upAcc=0;}
    return;
  }
  dispatchScroll._upAcc=0;
  if(!act4.relicShown){
    // 未完成滑动交互：最多推进到30%
    targetScrollY=clamp(targetScrollY+delta*.65,0,LOCK);
  } else {
    // 完成后：正常推进，但不超过100%
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
  }
}
function dispatchScroll(delta){
  if(phase!=='main') return;
  const handler=ACT_SCROLL_HANDLERS[currentAct];
  if(handler){ handler(delta); return; }
  // 默认（幕2-7）：向上累积超过400px→回上一幕
  if(delta<0){
    targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
    // 已在幕首且继续向上→回上一幕
    if(targetScrollY<=0&&currentAct>1){
      if(!dispatchScroll._upAcc) dispatchScroll._upAcc=0;
      dispatchScroll._upAcc+=Math.abs(delta);
      if(dispatchScroll._upAcc>400){
        dispatchScroll._upAcc=0;
        switchToAct(currentAct-1);
      }
    } else {
      dispatchScroll._upAcc=0;
    }
    return;
  }
  dispatchScroll._upAcc=0;
  targetScrollY=clamp(targetScrollY+delta*.65,0,SCROLL_PER_ACT);
}
function setupInput(){
  window.addEventListener('wheel',e=>{
    if(phase!=='main') return;
    e.preventDefault();
    dispatchScroll(e.deltaY);
  },{passive:false});
  window.addEventListener('touchstart',e=>{
    touchStartY=e.touches[0].clientY;
  },{passive:true});
  window.addEventListener('touchmove',e=>{
    if(phase!=='main') return;
    const dy=touchStartY-e.touches[0].clientY;
    dispatchScroll(dy*1.4);
    touchStartY=e.touches[0].clientY;
    e.preventDefault();
  },{passive:false});
  window.addEventListener('keydown',e=>{
    if(phase!=='main') return;
    if(e.key==='ArrowDown'||e.key===' ') dispatchScroll(80);
    if(e.key==='ArrowUp') dispatchScroll(-80);
  });
}
setupInput();

/* ══════════════════════════════════════════════════════════

   ██████  第一幕  ██████
   阶段：0初始 1点火把 2独白+剪影 3对话 4鸡蛋 5尾声

══════════════════════════════════════════════════════════ */
const TORCH_N=18;
let act1={
  stage:0,stars:[],torches:[],litCount:0,
  torchDone:false,sub0Complete:false,grandmaShown:false,dialogDone:false,
  eggDone:false,sub0Done:false,sub1Done:false,sub2Done:false,sub3Done:false,
  typingTimer:null,typingFull:'',typingIdx:0,typingDone:false,
  typingOnDone:null,typingStarted:false,upScrollAcc:0
};
/* ══════════════════════════════════════════════════════════
   第一幕阶段：
   0  初始静止，2秒后提示出现
   1  下滑逐一点亮火把（交互必须完成）
      ├ 第1个火把亮 → 独白1逐字
      └ 继续滑 → 更多火把 + 独白2淡入
   2  全部点亮 → 自动：集体闪烁→光链→1s后大娘走入→对话字幕
   3  自动：鸡蛋特写动画→独白3
   4  自动：火把减弱+画面左移→独白4停留
   5  自动收尾静止，白光边缘 → 用户下滑触发转场
══════════════════════════════════════════════════════════ */

// 状态
let act1_autoRunning=false; // 帧2以后是否在自动播放中

function initAct1(){
  act1={stage:0,stars:[],torches:[],litCount:0,

  };
  act1_autoRunning=false;
  act1_scrollAcc=0; // 重置累积滑动量，防止返回时跳帧
  // 重置所有UI元素状态
  const gw=qs('s1-grandma-wrap');
  if(gw){gw.classList.remove('show');gw.style.opacity='';}  // 清除内联样式，不能设成'0'

/* ── 第一幕滚动分发 ── */
/* ══════════════════════════════════════════
   第一幕阶段说明（全部由用户下滑推进）：
   0  初始静止
   1  下滑逐一点亮火把（需全部点亮）
   2  等待用户下滑→触发帧4（火把闪烁+光链）
   3  等待用户下滑→大娘渐显走入+打字对话
   4  对话打完→等待用户下滑→帧6鸡蛋动画（自动）
   5  动画结束→等待用户下滑→独白3
   6  等待用户下滑→帧7火把减弱+画面左移+独白4
   7  等待用户下滑→转场
══════════════════════════════════════════ */
// 帧推进需要累积滑动距离才触发（防止轻微误触）
const ACT1_FRAME_THRESHOLD = 120; // px，换帧所需累积滑动量
let act1_scrollAcc = 0; // 累积滑动量（只用于帧推进）

function handleAct1Scroll(delta){
  if(delta<0){
    act1.upScrollAcc+=Math.abs(delta);
    return;
  }
  act1.upScrollAcc=0;

  // 阶段1（点火把）：直接按delta控制，但每次最多亮2个
  if(act1.stage===1){
    act1_stage1_scroll(delta);
    return;
  }
  // 阶段0和其他阶段：需要累积达到阈值才触发换帧
  act1_scrollAcc += Math.abs(delta);
  if(act1_scrollAcc < ACT1_FRAME_THRESHOLD) return;
  act1_scrollAcc = 0; // 消耗累积量

  switch(act1.stage){
    case 0: act1.stage=1; break;
    case 2: act1_stage2_userScroll(); break;
    case 3: act1_stage3_userScroll(); break;
    case 4: act1_stage4_userScroll(); break;
    case 5: act1_stage5_userScroll(); break;
    case 6: act1_stage6_userScroll(); break;
  }
}

/* 阶段1：逐一点亮火把 */
/* ══════════════════════════════════════
   第一幕完整阶段逻辑
   stage 1  下滑点亮火把
            └ 第1个亮→独白1逐字「一九三四年…夜。」
            └ 独白1打完后，继续下滑→独白2「乡亲们举着火把…」
            └ 全部点亮→stage 2
   stage 2  下滑→火把集体闪烁→stage 3
   stage 3  下滑→大娘渐显+打字「娃，打了胜仗回来吃。」→stage 4
   stage 4  下滑→鸡蛋交接动画（自动播完）
            └ 动画结束→大娘渐隐→独白3「出发时…」→stage 5
   stage 5  下滑→独白4「后来才知道…」→stage 6
   stage 6  下滑→转场
══════════════════════════════════════ */

function act1_stage1_scroll(delta){
  const add=Math.min(2,Math.max(1,Math.floor(Math.abs(delta)/80)));
  const prev=act1.litCount;
  const newLit=Math.min(TORCH_N,act1.litCount+add);

  // 第1个火把亮→独白1逐字，打字完后自动出现独白2（不依赖下滑）
  if(prev===0&&newLit>=1&&!act1.sub0Done){
    act1.sub0Done=true;
    setTimeout(()=>{
      typewriteSub('一九三四年十月，于都河，夜。','narrate');
      // 独白1打字完成后（约1200ms），自动淡入独白2
      setTimeout(()=>{
        if(!act1.sub1Done){
          act1.sub1Done=true;
          showSub('乡亲们举着火把，送我们过河。','narrate');
        }
      },1400);
    },200);
  }

  for(let i=act1.litCount;i<newLit;i++) act1.torches[i].lit=true;
  act1.litCount=newLit;

  // 全部点亮→进入stage2等待下滑
  if(act1.litCount>=TORCH_N&&!act1.torchDone){
    act1.torchDone=true;
    act1.stage=2;
    hideHint();
    setTimeout(()=>setHint('继续下滑'),800);
  }
}

/* stage 2：火把集体闪烁，然后等待下滑触发大娘 */
function act1_stage2_userScroll(){
  act1.stage=-1;
  hideHint();
  act1.torches.forEach(t=>{t.brightTarget=2.2;});
  setTimeout(()=>act1.torches.forEach(t=>{t.brightTarget=1.0;}),500);
  setTimeout(()=>{
    act1.stage=3;
    setHint('下滑，听大娘说话');
  },1200);
}

/* 打字机（对话用） */
function act1_startTypewriter(text,onDone){
  const dialog=qs('s1-grandma-dialog');
  const txtEl=qs('s1-grandma-txt');
  dialog.classList.add('show');
  txtEl.textContent='';
  act1.typingIdx=0;
  act1.typingFull=text;
  act1.typingOnDone=onDone;
  act1.typingDone=false;
  act1.typingStarted=true;
  function typeNext(){
    if(act1.typingIdx>=text.length){
      act1.typingDone=true;
      if(act1.typingOnDone){setTimeout(act1.typingOnDone,400);act1.typingOnDone=null;}
      return;
    }
    txtEl.textContent+=text[act1.typingIdx++];
    act1.typingTimer=setTimeout(typeNext,90);
  }
  typeNext();
}
function act1_forceComplete(){
  if(act1.typingTimer) clearTimeout(act1.typingTimer);
  if(act1.typingFull){
    qs('s1-grandma-txt').textContent=act1.typingFull;
    act1.typingDone=true;
    if(act1.typingOnDone){setTimeout(act1.typingOnDone,300);act1.typingOnDone=null;}
  }
}

/* 独白打字机（旁白用，逐字淡入效果） */
function typewriteSub(text,type){
  const wrap=qs('subtitle-wrap');
  const el=document.createElement('span');
  el.className=`sub-line ${type}`;
  el.style.opacity='0';
  wrap.appendChild(el);
  let i=0;
  el.style.transition='opacity .4s ease';
  el.style.opacity='1';
  function next(){
    if(i>=text.length) return;
    el.textContent=text.substring(0,++i);
    setTimeout(next,60);
  }
  next();
  return el;
}

/* ── 火把绘制 ── */
class Spark1{
  constructor(x,y,b){
    this.x=x+(Math.random()-.5)*4;this.y=y-Math.random()*5;
    this.vx=(Math.random()-.5)*.8;this.vy=-(1+Math.random()*2);
    this.life=1;this.decay=.014+Math.random()*.02;this.r=(1+Math.random()*2)*b;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy*=.97;this.vx*=.98;this.life-=this.decay;}
}

function drawAct1Torches(){
  const tc=qs('s1-torches');if(!tc)return;
  const ctx=tc.getContext('2d');
  ctx.clearRect(0,0,tc.width,tc.height);
  const sw=tc.width,sh=tc.height;
  act1.torches.forEach((t,i)=>{
    if(!t.lit)return;
    t.flicker+=t.fsp;
    const f=.85+.15*Math.sin(t.flicker);
    // 平滑趋向目标亮度
    t.bright=lerp(t.bright,t.brightTarget,.06);
    const b=clamp(t.bright*f,0,2);
    const tx=t.bx*sw,ty=t.by*sh;
    const far=i>=9;
    const gr=ctx.createRadialGradient(tx,ty,0,tx,ty,(far?26:40)*Math.min(b,1.2));
    gr.addColorStop(0,`rgba(255,175,55,${.52*Math.min(b,1)})`);
    gr.addColorStop(.4,`rgba(255,115,15,${.22*Math.min(b,1)})`);
    gr.addColorStop(1,'rgba(255,75,0,0)');
    ctx.fillStyle=gr;
    ctx.beginPath();ctx.arc(tx,ty,(far?26:40)*Math.min(b,1.2),0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,215,90,${.9*Math.min(b,1.5)})`;
    ctx.beginPath();ctx.arc(tx,ty,(far?2.2:3.2)*Math.min(b,1.5),0,Math.PI*2);ctx.fill();
    if(Math.random()<.3*Math.min(b,1)) t.particles.push(new Spark1(tx,ty,Math.min(b,1)));
    t.particles=t.particles.filter(p=>{
      p.update();if(p.life<=0)return false;
      ctx.globalAlpha=p.life*.65*Math.min(b,1);
      ctx.fillStyle=`rgba(255,${150+Math.floor(70*p.life)},35,1)`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      return true;
    });
    ctx.globalAlpha=1;
  });
  // 光链（全亮后）
  if(act1.litCount>=TORCH_N){
    ctx.strokeStyle='rgba(255,135,25,.32)';
    ctx.lineWidth=1.5;ctx.setLineDash([4,6]);
    [[0,9],[9,TORCH_N]].forEach(([a,b2])=>{
      ctx.beginPath();
      act1.torches.slice(a,b2).forEach((t,i)=>{
        const tx=t.bx*sw+act1.panOffset,ty=t.by*sh;
        i===0?ctx.moveTo(tx,ty):ctx.lineTo(tx,ty);
      });
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }
}

/* 月亮倒影荡漾 + 浮光粒子 + 窗口灯光 */
let s1FxTime=0;
let s1Particles=[];
class S1Particle{
  constructor(){
    this.x=W()*(0.3+Math.random()*0.4);
    this.y=H()*(0.56+Math.random()*0.15);
    this.r=1+Math.random()*1.8;
    this.vy=-(0.08+Math.random()*0.15);
    this.vx=(Math.random()-0.5)*0.12;
    this.life=1;
    this.decay=0.003+Math.random()*0.004;
    this.alpha=0.18+Math.random()*0.22;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;}
}

function drawAct1FX(){
  const c=qs('s1-fx-canvas');
  if(!c)return;
  if(c.width!==W()||c.height!==H()){c.width=W();c.height=H();}
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  s1FxTime+=0.018;

  // 月亮倒影荡漾
  const riverY=c.height*0.57;
  const moonX=c.width*0.475;
  for(let i=0;i<14;i++){
    const t=s1FxTime+i*0.25;
    const wobble=Math.sin(t)*7+Math.cos(t*0.65)*3;
    const py=riverY+i*(c.height*0.015);
    const pw=Math.max(1.5,(13-i)*1.1+Math.sin(t*1.2)*2.5);
    const alpha=(0.07-i*0.004)*Math.abs(Math.sin(t*0.35+0.5));
    ctx.fillStyle=`rgba(255,238,170,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(moonX+wobble,py,pw,2.2,0,0,Math.PI*2);
    ctx.fill();
  }

  // 河面浮光粒子
  if(Math.random()<0.1) s1Particles.push(new S1Particle());
  s1Particles=s1Particles.filter(p=>{
    p.update();if(p.life<=0)return false;
    ctx.globalAlpha=p.life*p.alpha;
    ctx.fillStyle='rgba(255,240,190,1)';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    return true;
  });
  ctx.globalAlpha=1;

  // 村庄窗口灯光跳动
  const villageY=c.height*0.435;
  [{x:.22,s:16},{x:.28,s:13},{x:.34,s:15},{x:.42,s:19},
   {x:.48,s:22},{x:.54,s:17},{x:.60,s:15},{x:.66,s:13},{x:.72,s:14}
  ].forEach((l,i)=>{
    const f=0.65+0.35*Math.sin(s1FxTime*2+i*1.4);
    const g=ctx.createRadialGradient(l.x*c.width,villageY,0,l.x*c.width,villageY,l.s*f);
    g.addColorStop(0,`rgba(255,175,55,${0.1*f})`);
    g.addColorStop(1,'rgba(255,130,15,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(l.x*c.width,villageY,l.s*f,0,Math.PI*2);ctx.fill();
  });
}

function updateAct1(){
  // 天空、星星、月亮均由 act1_sky.png 提供，无需canvas绘制
  // 视差 + 帧7左移偏移
  const pan=act1.panOffset||0;
  // 各层视差速度：远景慢，近景快
  const layerSpeeds=[
    {id:'s1-mountain', ySpeed:0.06, panMult:0.1},
    {id:'s1-village',  ySpeed:0.10, panMult:0.2},
    {id:'s1-river',    ySpeed:0.14, panMult:0.3},
    {id:'s1-shore',    ySpeed:0.18, panMult:0.5},
    {id:'s1-reeds',    ySpeed:0.26, panMult:0.8},
  ];
  // 天空层单独处理（只有微弱视差，不参与pan）
  const skyEl=qs('s1-sky');
  if(skyEl) skyEl.style.transform=`translateY(0px)`;

  layerSpeeds.forEach(({id,ySpeed,panMult})=>{
    const el=qs(id);
    if(el) el.style.transform=`translateX(${pan*panMult}px)`;
  });
  drawAct1Torches();
  drawAct1FX();
}

function playEggScene(onComplete){
  const scene      = qs('egg-scene');
  const grandmaImg = qs('egg-grandma-img');
  const playerHand = qs('egg-player-hand');
  const grandmaHand= qs('egg-grandma-hand');
  const eggItem    = qs('egg-item');

  // 先把大娘图隐藏（她已经在s1-grandma-wrap里显示过了）
  // 淡入整体场景（黑底）
  scene.classList.add('active');

  // t=0：主角的手从下方升起
  setTimeout(()=>{
    playerHand.classList.add('show');
  }, 300);

  // t=1.2s：大娘的手从上方降下（可见但未覆盖）
  setTimeout(()=>{
    grandmaHand.classList.add('show');
  }, 1200);

  // t=2.5s：大娘的手完全覆盖主角手
  setTimeout(()=>{
    grandmaHand.classList.add('cover');
  }, 2500);

  // t=4.0s：大娘的手缓缓向上挪开
  setTimeout(()=>{
    grandmaHand.classList.add('retract');
    grandmaHand.classList.remove('cover');
  }, 4000);

  // t=4.8s：鸡蛋在主角手心显现
  setTimeout(()=>{
    eggItem.classList.add('show');
  }, 4800);

  // t=7.5s：淡出整个场景
  setTimeout(()=>{
    scene.style.transition='opacity 1.2s ease';
    scene.style.opacity='0';
  }, 7500);

  // t=8.8s：重置清理，触发回调
  setTimeout(()=>{
    scene.classList.remove('active');
    scene.style.cssText='';
    [grandmaImg,playerHand,grandmaHand,eggItem].forEach(el=>{
      if(el){el.className='';el.style.cssText='';}
    });
    if(onComplete) onComplete();
  }, 8800);
}

let act2={
  particles:[],mudStrokes:[],
  bookShown:false,mudShown:false,commissarShown:false,
  sub0:false,sub1:false,sub2:false,sub3:false,sub4:false,sub5:false,
  isDrawing:false
};

function initAct2(){
  act2={particles:[],mudStrokes:[],
    bookShown:false,mudShown:false,commissarShown:false,
    sub0:false,sub1:false,sub1b:false,sub1c:false,sub1d:false,sub1e:false,sub2:false,sub3:false,sub4:false,sub5:false,
    isDrawing:false};

  // 天空canvas
  // 天空已由 act2_sky.png 提供，初始化动效canvas
  const fc=qs('s2-firefly');if(fc){fc.width=W();fc.height=H();}
  const sfx=qs('s2-sky-fx');if(sfx){sfx.width=W();sfx.height=H();}
  // 初始化闪烁星星（更亮，更强闪烁）
  act2._stars=Array.from({length:80},()=>({
    x:Math.random()*W(),y:Math.random()*H()*0.48,
    r:0.6+Math.random()*2.0,
    ph:Math.random()*Math.PI*2,
    sp:0.015+Math.random()*0.04, // 更快的闪烁速度
    oMin:0.1+Math.random()*0.2,  // 最暗时
    oMax:0.8+Math.random()*0.2,  // 最亮时
  }));
  // 初始化云朵
  act2._clouds=[
    {x:W()*0.1, y:H()*0.12, w:180, h:28, speed:0.12, o:0.06},
    {x:W()*0.5, y:H()*0.08, w:240, h:35, speed:0.08, o:0.05},
    {x:W()*0.8, y:H()*0.18, w:160, h:22, speed:0.10, o:0.07},
  ];

  // 泥地canvas
  const mc=qs('act2-mud-canvas');mc.width=W();mc.height=H()*.35;

  // 萤火虫粒子
  const scEl=qs('scene-2');
  scEl.addEventListener('mousemove',act2MouseMove);
  scEl.addEventListener('touchmove',act2TouchMove,{passive:true});
}

class Firefly{
  constructor(x,y){
    this.x=x+(Math.random()-.5)*8;this.y=y+(Math.random()-.5)*8;
    this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;
    this.life=1;this.maxLife=1;this.decay=.004+Math.random()*.006;
    this.r=1.5+Math.random()*1.5;this.ph=Math.random()*Math.PI*2;
  }
  update(){
    this.ph+=.06;this.x+=this.vx;this.y+=this.vy;
    this.vx*=.99;this.vy*=.99;this.life-=this.decay;
  }
}

function act2MouseMove(e){
  if(phase!=='main'||currentAct!==2) return;
  hideHint();
  for(let i=0;i<3;i++) act2.particles.push(new Firefly(e.clientX,e.clientY));
}
function act2TouchMove(e){
  if(phase!=='main'||currentAct!==2) return;
  hideHint();
  const t=e.touches[0];
  for(let i=0;i<3;i++) act2.particles.push(new Firefly(t.clientX,t.clientY));
}

function updateAct2(progress,sy){
  // 天空背景由 act2_sky.png 提供，叠加星星闪烁和云朵动效
  const sfx=qs('s2-sky-fx');
  if(sfx&&act2._stars){
    const sctx=sfx.getContext('2d');
    sctx.clearRect(0,0,sfx.width,sfx.height);
    // 闪烁星星（呼吸感更强）
    act2._stars.forEach(s=>{
      s.ph+=s.sp;
      const t=(Math.sin(s.ph)+1)/2; // 0~1
      const a=s.oMin+t*(s.oMax-s.oMin);
      const r=s.r*(0.7+0.3*t); // 亮时略大
      sctx.beginPath();sctx.arc(s.x,s.y,r,0,Math.PI*2);
      sctx.fillStyle=`rgba(255,255,255,${a})`;sctx.fill();
      // 最亮的星加一点光晕
      if(a>0.7){
        const g=sctx.createRadialGradient(s.x,s.y,0,s.x,s.y,r*3);
        g.addColorStop(0,`rgba(200,220,255,${(a-0.7)*0.5})`);
        g.addColorStop(1,'rgba(200,220,255,0)');
        sctx.fillStyle=g;
        sctx.beginPath();sctx.arc(s.x,s.y,r*3,0,Math.PI*2);sctx.fill();
      }
    });
    // 缓缓移动的云朵
    if(act2._clouds){
      act2._clouds.forEach(c=>{
        c.x+=c.speed;
        if(c.x>sfx.width+c.w) c.x=-c.w;
        sctx.fillStyle=`rgba(180,210,240,${c.o})`;
        sctx.beginPath();
        sctx.ellipse(c.x,c.y,c.w,c.h,0,0,Math.PI*2);
        sctx.fill();
        sctx.beginPath();
        sctx.ellipse(c.x+c.w*0.3,c.y-c.h*0.4,c.w*0.6,c.h*0.8,0,0,Math.PI*2);
        sctx.fill();
      });
    }
  }

  parallax(2,sy);

  // 萤火虫canvas
  const sc=qs('s2-firefly');
  if(sc){
    const sctx=sc.getContext('2d');
    sctx.clearRect(0,0,sc.width,sc.height);
    if(Math.random()<.04){
      const bx=Math.random()*sc.width;
      const by=sc.height*.8+Math.random()*sc.height*.15;
      sctx.beginPath();sctx.arc(bx,by,2+Math.random()*3,0,Math.PI*2);
      sctx.strokeStyle='rgba(100,130,60,.25)';sctx.stroke();
    }
  }

  // 萤火虫
  const ssc=qs('s2-firefly');
  if(ssc){
    const sctx=ssc.getContext('2d');
    act2.particles=act2.particles.filter(p=>{
      p.update();if(p.life<=0) return false;
      const alpha=p.life*(0.6+0.4*Math.sin(p.ph));
      const gg=sctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
      gg.addColorStop(0,`rgba(180,220,60,${alpha*.9})`);
      gg.addColorStop(1,'rgba(100,180,20,0)');
      sctx.fillStyle=gg;sctx.beginPath();sctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);sctx.fill();
      sctx.fillStyle=`rgba(220,255,100,${alpha})`;
      sctx.beginPath();sctx.arc(p.x,p.y,p.r,0,Math.PI*2);sctx.fill();
      return true;
    });
  }

  // 进度节点
  if(progress>.04&&!act2.sub0){act2.sub0=true;
    showSub('白天是毒蛇和泥沼，夜里是脚底的血泡。','narrate');}
  if(progress>.20&&!act2.sub1){act2.sub1=true;
    showSub('草鞋烂了，就用破布裹着脚走。','narrate');}
  if(progress>.38&&!act2.bookShown){
    act2.bookShown=true;
    qs('act2-book').classList.add('show');
    setTimeout(()=>showSub('夜里躺在地上，政委教我认字。','narrate'),500);
  }
  if(progress>.50&&!act2.mudShown){
    act2.mudShown=true;
    qs('act2-mud-canvas').classList.add('show');
    showSub('战友们躺在一起，也像一个个「人」字。','narrate');
  }
  if(progress>.62&&!act2.commissarShown){
    act2.commissarShown=true;
    qs('act2-commissar-wrap').classList.add('show');
    setTimeout(()=>{
      qs('act2-commissar-dialog').classList.add('show');
      showSub('人字两笔，互相撑着。你撑我，我撑你，就是一群人。','npc','政委');
    },600);
  }
  if(progress>.78&&!act2.sub4){
    act2.sub4=true;
    showSub('聚是一把火，散是满天星。','narrate');
  }
  if(progress>.84&&!act2.sub5){
    act2.sub5=true;
    showSub('我们这么小的人，连起来，能走出这片海。','narrate');
    // 独白结束后政委和课本同步渐隐
    setTimeout(()=>{
      qs('act2-book').classList.remove('show');
      qs('act2-commissar-wrap').classList.remove('show');
      qs('act2-commissar-dialog').classList.remove('show');
    },2000);
  }
  if(progress>.95) switchToAct(3);
}

/* ── 第三幕：老兵出场（诗念完后调用） ── */

/* ── 泪滴动画（第三幕：主角说「没有」时触发） ── */
function playTearDrop(){
  const tc2=qs('act3-tear-canvas');
  if(!tc2||act3.tearDropped) return;
  act3.tearDropped=true;
  // 定位到课本右侧区域
  tc2.style.right='calc(6vw + 160px)';
  tc2.style.top=(H()/2+10)+'px';
  tc2.classList.add('show');
  const tctx=tc2.getContext('2d');
  // 阶段1：泪珠下落
  let phase=0,y=0,rippleR=0,rippleAlpha=1;
  function frame(){
    tctx.clearRect(0,0,60,60);
    if(phase===0){
      // 泪珠
      y+=1.5;
      tctx.fillStyle='rgba(160,200,240,.85)';
      tctx.beginPath();
      tctx.arc(30,10+y,4,0,Math.PI*2);
      tctx.fill();
      if(y>=18){ phase=1; }
    } else {
      // 涟漪扩散
      rippleR+=1.2;rippleAlpha-=.025;
      if(rippleAlpha<=0){
        // 留下水迹
        tctx.fillStyle='rgba(160,200,240,.15)';
        tctx.beginPath();tctx.ellipse(30,29,6,3,0,0,Math.PI*2);tctx.fill();
        return;
      }
      tctx.beginPath();
      tctx.ellipse(30,29,rippleR,rippleR*.35,0,0,Math.PI*2);
      tctx.strokeStyle=`rgba(160,200,240,${rippleAlpha*.6})`;
      tctx.lineWidth=1.2;tctx.stroke();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

let act3={
  ripples:[],fish:[],moonShatter:false,moonPieces:[],
  moonRestored:false,bookShown:false,oldmanShown:false,tearDropped:false,
  sub0:false,sub1:false,sub2:false,sub3:false,sub4:false,
  canSwitch:false,interacting:false
};

function initAct3(){
  act3={ripples:[],fish:[],moonShatter:false,moonPieces:[],
    moonRestored:false,bookShown:false,oldmanShown:false,tearDropped:false,
    sub0:false,sub1:false,sub2:false,sub3:false,sub4:false,
    canSwitch:false,interacting:false};

  // 天空、月亮、树林、河面均由PNG提供
  const skyC=qs('s3-sky'); // img元素，不需要设置canvas尺寸
  // 初始化鱼群canvas
  const fc=qs('s3-fish');if(fc){fc.width=W();fc.height=H();}

  // 月亮由 act3_moon.png 提供，无需canvas绘制

  // 鱼群
  act3.fish=Array.from({length:12},()=>({
    x:Math.random()*W(),y:H()*.75+Math.random()*H()*.15,
    vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.2,
    size:4+Math.random()*6,phase:Math.random()*Math.PI*2
  }));

  // 月亮倒影碎片初始化（等待触发）
  act3.moonPieces=Array.from({length:14},(_,i)=>{
    const angle=i/14*Math.PI*2;
    return{
      x:W()*.5+Math.cos(angle)*20,y:H()*.75+Math.sin(angle)*10,
      vx:Math.cos(angle)*(1+Math.random()*2),vy:Math.sin(angle)*(1+Math.random()),
      r:8+Math.random()*14,alpha:0,born:false
    };
  });

  const rc=qs('s3-fish');if(rc){rc.width=W();rc.height=H();}
  const rpc=qs('s3-ripple');if(rpc){rpc.width=W();rpc.height=H();}

  // 水面波纹系统
  act3._ripples=[];      // 用户触发的扩散波纹
  act3._waveTime=0;      // 自然波纹时间计数
  act3._flowOffset=0;    // 水面流动偏移

  // 鼠标/触摸划过水面时产生波纹
  const scEl=qs('scene-3');
  scEl.addEventListener('pointermove',e=>{
    if(phase!=='main'||currentAct!==3) return;
    const riverTop=H()*0.52; // 河面大约从屏幕52%开始
    if(e.clientY>riverTop){
      // 在划过的位置添加波纹
      if(Math.random()<0.35){
        act3._ripples.push({
          x:e.clientX, y:e.clientY,
          r:0, maxR:80+Math.random()*60,
          life:1, speed:1.2+Math.random()*0.8
        });
      }
    }
  });
  scEl.addEventListener('touchmove',e=>{
    if(phase!=='main'||currentAct!==3) return;
    const t=e.touches[0];
    if(t.clientY>H()*0.52&&Math.random()<0.35){
      act3._ripples.push({
        x:t.clientX,y:t.clientY,
        r:0,maxR:80+Math.random()*60,
        life:1,speed:1.2+Math.random()*0.8
      });
    }
  },{passive:true});

  const scEl2=qs('scene-3');
  scEl2.addEventListener('mousemove',act3MouseMove);
  scEl2.addEventListener('touchmove',act3TouchMove,{passive:true});
}

class Ripple{
  constructor(x,y){
    this.x=x;this.y=y;this.r=0;this.maxR=80+Math.random()*40;
    this.life=1;this.decay=.012;
  }
  update(){this.r+=2;this.life-=this.decay;}
}

class Fish{
  constructor(x,y){
    this.x=x;this.y=y;this.tx=W()*.5;this.ty=H()*.75;
    this.vx=0;this.vy=0;this.size=4+Math.random()*5;
    this.phase=Math.random()*Math.PI*2;this.toMoon=false;
  }
}

function act3MouseMove(e){
  if(phase!=='main'||currentAct!==3) return;
  hideHint();act3.interacting=true;
  if(e.clientY>H()*.55) act3.ripples.push(new Ripple(e.clientX,e.clientY));
  act3.fish.forEach(f=>{
    const dx=f.x-e.clientX,dy=f.y-e.clientY,d=Math.sqrt(dx*dx+dy*dy);
    if(d<120){f.vx+=dx/d*.5;f.vy+=dy/d*.3;f.toMoon=true;}
  });
}
function act3TouchMove(e){
  const t=e.touches[0];
  act3MouseMove({clientX:t.clientX,clientY:t.clientY});
}

function updateAct3(progress,sy){
  // 天空、月亮、树林、河面均由PNG提供，无需canvas绘制

  parallax(3,sy);
  // 月亮和树林视差极小，保持画面稳定
  const moonEl=qs('s3-moon');
  if(moonEl) moonEl.style.transform=`translateY(${-sy*0.01}px)`;
  const treesEl=qs('s3-trees');
  if(treesEl) treesEl.style.transform=`translateY(${-sy*0.02}px)`;
  // 河面完全不动
  const riverEl=qs('s3-river');
  if(riverEl) riverEl.style.transform='translateY(0)';

  // ── 水面波纹绘制 ──
  const rpc=qs('s3-ripple');
  if(rpc&&act3._ripples!==undefined){
    const rctx2=rpc.getContext('2d');
    rctx2.clearRect(0,0,rpc.width,rpc.height);

    act3._waveTime+=0.018;
    act3._flowOffset=(act3._flowOffset+0.4)%rpc.width;

    const riverTop=rpc.height*0.52;
    const moonX=rpc.width*0.5;
    const moonReflectY=rpc.height*0.72; // 月亮倒影中心Y

    // 月亮倒影荡漾（竖向正弦扭动光柱）
    for(let i=0;i<10;i++){
      const py=moonReflectY+i*14;
      if(py>rpc.height) break;
      const wobble=Math.sin(act3._waveTime*1.2+i*0.6)*6;
      const w=Math.max(2,22-i*2);
      const alpha=Math.max(0,0.12-i*0.01)*(0.7+0.3*Math.sin(act3._waveTime+i*0.4));
      rctx2.fillStyle=`rgba(255,240,180,${alpha})`;
      rctx2.fillRect(moonX+wobble-w/2, py, w, 11);
    }

    // 水面横向流动光纹
    rctx2.strokeStyle='rgba(150,180,220,0.04)';
    rctx2.lineWidth=1;
    for(let i=0;i<8;i++){
      const y=riverTop+40+i*28;
      const xOff=(act3._flowOffset+i*80)%rpc.width;
      rctx2.beginPath();
      rctx2.moveTo(xOff-rpc.width, y+Math.sin(act3._waveTime+i)*3);
      rctx2.lineTo(xOff, y+Math.sin(act3._waveTime+i+1)*3);
      rctx2.stroke();
    }

    // 用户触发的扩散波纹
    act3._ripples=act3._ripples.filter(rp=>{
      rp.r+=rp.speed;
      rp.life=1-rp.r/rp.maxR;
      if(rp.life<=0) return false;
      rctx2.beginPath();
      rctx2.ellipse(rp.x,rp.y, rp.r, rp.r*0.3, 0, 0, Math.PI*2);
      rctx2.strokeStyle=`rgba(180,210,240,${rp.life*0.25})`;
      rctx2.lineWidth=1.5;
      rctx2.stroke();
      // 波纹经过月亮倒影区域时加强亮度
      const distToMoon=Math.abs(rp.x-moonX);
      if(distToMoon<60){
        rctx2.strokeStyle=`rgba(255,240,180,${rp.life*0.15})`;
        rctx2.beginPath();
        rctx2.ellipse(rp.x,rp.y,rp.r*0.6,rp.r*0.18,0,0,Math.PI*2);
        rctx2.stroke();
      }
      return true;
    });

    // 自然随机小波纹（模拟微风）
    if(Math.random()<0.04){
      const rx=rpc.width*0.2+Math.random()*rpc.width*0.6;
      const ry=riverTop+Math.random()*(rpc.height-riverTop)*0.8;
      act3._ripples.push({x:rx,y:ry,r:0,maxR:30+Math.random()*20,life:1,speed:0.5});
    }
  }

  // 鱼群和河面特效绘制在 s3-fish canvas 上（s3-river 已是PNG图片）
  const rc=qs('s3-fish');
  if(rc){
    const rctx=rc.getContext('2d');
    rctx.clearRect(0,0,rc.width,rc.height);
    // 河面由 act3_river.png 提供，不再绘制基底色块

    // 月亮倒影
    const mx=W()*.5,my=H()*.76;
    if(!act3.moonShatter){
      const mg=rctx.createRadialGradient(mx,my,0,mx,my,30);
      mg.addColorStop(0,'rgba(200,220,190,.22)');mg.addColorStop(1,'rgba(150,180,140,0)');
      rctx.fillStyle=mg;rctx.beginPath();rctx.ellipse(mx,my,14,36,0,0,Math.PI*2);rctx.fill();
    }

    // 波纹
    act3.ripples=act3.ripples.filter(r=>{
      r.update();if(r.life<=0) return false;
      rctx.beginPath();rctx.ellipse(r.x,r.y,r.r,r.r*.3,0,0,Math.PI*2);
      rctx.strokeStyle=`rgba(150,180,220,${r.life*.2})`;rctx.lineWidth=1;rctx.stroke();
      return true;
    });

    // 月亮倒影破碎
    if(act3.moonShatter&&!act3.moonRestored){
      let allStop=true;
      act3.moonPieces.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;
        if(Math.abs(p.vx)>.01||Math.abs(p.vy)>.01) allStop=false;
        if(p.born) p.alpha=Math.min(1,p.alpha+.04);
        rctx.globalAlpha=p.alpha*.6;
        rctx.fillStyle='rgba(200,220,190,1)';
        rctx.beginPath();rctx.ellipse(p.x,p.y,p.r*.5,p.r*.2,Math.random()*.5,0,Math.PI*2);rctx.fill();
      });
      rctx.globalAlpha=1;
      if(allStop) act3.moonRestored=true;
    }

    // 鱼群
    act3.fish.forEach(f=>{
      f.phase+=.08;
      if(f.toMoon){
        const dx=mx-f.x,dy=(H()*.76)-f.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>30){f.vx+=dx/d*.06;f.vy+=dy/d*.04;}
        else{
          // 鱼触碰月亮倒影→破碎
          if(!act3.moonShatter){
            act3.moonShatter=true;
            act3.moonPieces.forEach(p=>{p.born=true;});
          }
          f.vx*=.98;f.vy*=.98;
        }
      }
      f.vx*=.99;f.vy*=.99;
      f.x+=f.vx;f.y+=f.vy;
      if(f.x<0)f.x=W();if(f.x>W())f.x=0;
      const tail=Math.sin(f.phase)*f.size*.4;
      const fishAngle=Math.atan2(f.vy,f.vx);
      // 发光光晕
      const glow=rctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size*2.5);
      glow.addColorStop(0,'rgba(160,210,255,0.28)');
      glow.addColorStop(1,'rgba(100,160,255,0)');
      rctx.fillStyle=glow;
      rctx.beginPath();rctx.arc(f.x,f.y,f.size*2.5,0,Math.PI*2);rctx.fill();
      // 鱼身
      rctx.fillStyle='rgba(180,220,255,.85)';
      rctx.beginPath();
      rctx.ellipse(f.x,f.y,f.size,f.size*.35,fishAngle,0,Math.PI*2);rctx.fill();
      // 鱼尾
      rctx.fillStyle='rgba(140,190,240,.7)';
      rctx.beginPath();
      const angle=fishAngle+Math.PI;
      rctx.moveTo(f.x+Math.cos(angle)*f.size,f.y+Math.sin(angle)*f.size);
      rctx.lineTo(f.x+Math.cos(angle+.4)*f.size*1.4+tail,f.y+Math.sin(angle+.4)*f.size*1.4);
      rctx.lineTo(f.x+Math.cos(angle-.4)*f.size*1.4-tail,f.y+Math.sin(angle-.4)*f.size*1.4);
      rctx.closePath();rctx.fill();
      // 鱼身高光
      rctx.fillStyle='rgba(220,240,255,0.5)';
      rctx.beginPath();
      rctx.ellipse(f.x-Math.cos(fishAngle)*f.size*.2,
                   f.y-Math.sin(fishAngle)*f.size*.2,
                   f.size*.4,f.size*.15,fishAngle,0,Math.PI*2);
      rctx.fill();
    });
  }

  // 进度节点
  if(progress>.04&&!act3.sub0){act3.sub0=true;
    showSub('衣服湿了又干，干了又湿。','narrate');}
  if(progress>.20&&!act3.sub1){act3.sub1=true;
    showSub('不知道为何来回走。','narrate');}
  if(progress>.45&&!act3.bookShown){
    act3.bookShown=true;
    qs('act3-book').classList.add('show');
    // 主角逐句朗读，走主角对话框（蓝色横条）
    const poemLines=[
      {txt:'床前明月光，',        delay:0},
      {txt:'疑是地上霜。',        delay:1200},
      {txt:'举头望明月，',        delay:2400},
      {txt:'低头……',             delay:3600},
    ];
    poemLines.forEach(({txt,delay})=>{
      setTimeout(()=>{
        showPlayerDialog(txt);
      },delay);
    });
    // 「低头……」停顿后隐藏对话框，1.5s后老兵出场
    setTimeout(()=>{
      hidePlayerDialog();
      setTimeout(()=>act3_showOldman(), 1500);
    }, 3600+1800);
  }
  if(progress>.78&&!act3.sub2){act3.sub2=true;
    showSub('我不知道为啥要渡河、还要渡几次河，','narrate');}
  if(progress>.88&&!act3.sub3){act3.sub3=true;
    showSub('但我知道，河对岸有我们要去的地方。','narrate');
    setTimeout(()=>{ act3.canSwitch=true; },2500);
  }
  if(progress>.95&&act3.canSwitch) switchToAct(4);
}

   ██████  第四幕  ██████

══════════════════════════════════════════════════════════ */
let act4={
  smokeParticles:[],bulletTrails:[],relicShown:false,
  flashTimer:null,
  swipeStartX:null,swipeDist:0,swipeProgress:0,
  canSwitch:false,
  sub0:false,sub1:false,sub3:false,sub4:false,sub5:false
};

function initAct4(){
  // 防御：如果上次handlers未清除（比如从其他幕跳回），先强制移除
  if(act4._handlers){
    const h=act4._handlers;
    document.removeEventListener('mousedown', h.onMouseDown);
    document.removeEventListener('mousemove', h.onMouseMove);
    document.removeEventListener('mouseup',   h.onMouseUp);
    document.removeEventListener('touchstart',h.onTouchStart);
    document.removeEventListener('touchmove', h.onTouchMove);
    document.removeEventListener('touchend',  h.onTouchEnd);
  }
  // 确保遗物完全隐藏并重置opacity
  const relicEl=qs('act4-relic');
  relicEl.classList.remove('show');
  relicEl.style.opacity='0';

  act4={smokeParticles:[],bulletTrails:[],relicShown:false,
    flashTimer:null,_handlers:null,
    swipeStartX:null,swipeDist:0,swipeProgress:0,
    canSwitch:false,
    sub0:false,sub1:false,sub3:false,sub4:false,sub5:false};

  // 确保滚动位置归零（防止上一幕残留）
  targetScrollY=0;scrollY=0;

  const skyC=qs('s4-sky');skyC.width=W();skyC.height=H();
  const sc=qs('s4-smoke');sc.width=W();sc.height=H();
  const fx=qs('s4-fx');fx.width=W();fx.height=H();

  // 间歇炮火闪光（烟雾未散时）
  act4.flashTimer=setInterval(()=>{
    if(currentAct!==4) return;
    if(act4.swipeProgress>.5) return;
    const fl=qs('act4-flash');
    fl.style.opacity='.18';
    setTimeout(()=>{fl.style.opacity='0';},80);
  },2200);

  // 左右滑动事件 — 绑定在document上，确保能接收到事件
  function onMouseDown(e){
    if(phase!=='main'||currentAct!==4) return;
    act4.swipeStartX=e.clientX;
  }
  function onMouseMove(e){
    if(currentAct!==4||act4.swipeStartX===null||act4.swipeProgress>=1) return;
    const dx=Math.abs(e.clientX-act4.swipeStartX);
    act4.swipeDist=Math.max(act4.swipeDist,dx);
    act4.swipeProgress=Math.min(1, act4.swipeDist/(W()*0.5));
  }
  function onMouseUp(){ act4.swipeStartX=null; }
  function onTouchStart(e){
    if(phase!=='main'||currentAct!==4) return;
    act4.swipeStartX=e.touches[0].clientX;
  }
  function onTouchMove(e){
    if(currentAct!==4||act4.swipeStartX===null||act4.swipeProgress>=1) return;
    const dx=Math.abs(e.touches[0].clientX-act4.swipeStartX);
    act4.swipeDist=Math.max(act4.swipeDist,dx);
    act4.swipeProgress=Math.min(1, act4.swipeDist/(W()*0.5));
  }
  function onTouchEnd(){ act4.swipeStartX=null; }

  document.addEventListener('mousedown', onMouseDown);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('touchstart',onTouchStart,{passive:true});
  document.addEventListener('touchmove', onTouchMove, {passive:true});
  document.addEventListener('touchend',  onTouchEnd,  {passive:true});

  // 保存引用，便于cleanup时移除
  act4._handlers={onMouseDown,onMouseMove,onMouseUp,onTouchStart,onTouchMove,onTouchEnd};
}

function act4_onSwipeDone(){
  if(act4.relicShown) return;
  act4.relicShown=true;
  // 1. 隐藏滑动提示，还原icon
  hideHint();
  qs('hint-icon').classList.remove('swipe-hint');
  // 2. 遗物渐显
  act4_showRelic();
  // 3. 延迟后提示继续下滑
  setTimeout(()=>{
    setHint('↓ 继续下滑');
    qs('hint-icon').classList.remove('swipe-hint');
  },1600);
}

function act4_showRelic(){
  const el=qs('act4-relic');
  el.classList.add('show');
  el.style.opacity='1';
}

class SmokeParticle{
  constructor(){
    this.x=Math.random()*W();
    this.y=Math.random()*H();          // 全屏分布，更厚重
    this.r=40+Math.random()*80;        // 更大的粒子
    this.vx=(Math.random()-.5)*.4;
    this.vy=-(0.1+Math.random()*.25);
    this.life=1;this.decay=.0008+Math.random()*.002; // 生命更长
    this.alpha=0.10+Math.random()*.18; // 更高透明度
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.r+=.3;this.life-=this.decay;}
}

function updateAct4(progress,sy){
  parallax(4,sy);

  const lp=act4.swipeProgress;

  // 每帧检测滑动完成（不依赖事件回调）
  if(lp>=1&&!act4.relicShown) act4_onSwipeDone();

  // 硝烟粒子（更密更厚）
  const sc=qs('s4-smoke');
  if(sc){
    const sctx=sc.getContext('2d');
    sctx.clearRect(0,0,sc.width,sc.height);
    // 生成速率大幅提升，上限120个
    if(act4.smokeParticles.length<120 && Math.random()<.25*(1-lp))
      act4.smokeParticles.push(new SmokeParticle());
    act4.smokeParticles=act4.smokeParticles.filter(p=>{
      p.update();if(p.life<=0) return false;
      const a=p.alpha*p.life*(1-lp*0.9);
      // 烟雾颜色：深灰夹杂暗橙，模拟战场硝烟
      const warm=Math.random()>.6;
      sctx.fillStyle=warm
        ?`rgba(160,100,60,${a})`
        :`rgba(140,135,130,${a})`;
      sctx.beginPath();sctx.arc(p.x,p.y,p.r,0,Math.PI*2);sctx.fill();
      return true;
    });
  }

  // 子弹轨迹（硝烟未散时）
  const fx=qs('s4-fx');
  if(fx){
    const fctx=fx.getContext('2d');
    fctx.clearRect(0,0,fx.width,fx.height);
    if(Math.random()<.05*(1-lp)){
      const y=H()*.1+Math.random()*H()*.6;
      const fromLeft=Math.random()>.5;
      fctx.strokeStyle=`rgba(255,255,200,${.15*(1-lp)})`;
      fctx.lineWidth=.8;fctx.setLineDash([6,8]);
      fctx.beginPath();
      fctx.moveTo(fromLeft?0:fx.width,y);
      fctx.lineTo(fromLeft?Math.random()*fx.width*.6:fx.width-Math.random()*fx.width*.6,y);
      fctx.stroke();fctx.setLineDash([]);
    }
  }

  // 进度节点字幕
  if(progress>.04&&!act4.sub0){act4.sub0=true;
    showSub('冲锋号震得耳朵疼，子弹擦着耳边飞。','narrate');}
  if(progress>.22&&!act4.sub1){act4.sub1=true;
    showSub('身边的李狗蛋突然不说话了。','narrate');
    setTimeout(()=>{
      setHint('← 左右滑动屏幕，让硝烟散去 →');
      qs('hint-icon').classList.add('swipe-hint');
    },1200);
  }
  if(act4.relicShown&&progress>.45&&!act4.sub3){act4.sub3=true;
    showSub('他叫李狗蛋，湖南人，会唱山歌。','narrate');}
  if(act4.relicShown&&progress>.65&&!act4.sub4){act4.sub4=true;
    showPlayerDialog('狗蛋，你还没教我唱完那支山歌呢。');
    setTimeout(()=>hidePlayerDialog(),3500);}
  if(act4.relicShown&&progress>.88&&!act4.sub5){act4.sub5=true;
    showSub('他还没教我唱完那首歌。但我会替他唱下去。唱给每一个活着的人听。','narrate');
    setTimeout(()=>{ act4.canSwitch=true; },2500);
  }
  if(progress>.95&&act4.canSwitch){
    const r=qs('act4-relic');
    r.style.transition='none';
    r.style.opacity='0';
    switchToAct(5);
  }
}

/* ══════════════════════════════════════════════════════════

   ██████  第五幕  ██████  飞夺泸定桥

══════════════════════════════════════════════════════════ */
let act5={
  torchLit:0,sparks:[],_boards:[],
  flashbackDone:false,shoutDone:false,
  panOffset:0,panMax:0,
  povShown:false,shakeExtra:false,fadeStarted:false,canSwitch:false,
  sub0:false,sub1:false,sub2:false,sub3:false,sub4:false
};

let act5PointerDown=false;
let act5SwipeX=-1;
let act5SwipeTotalDx=0;

function initAct5(){
  act5PointerDown=false;
  act5SwipeX=-1;
  act5SwipeTotalDx=0;
  act5={torchLit:0,sparks:[],_boards:[],
    flashbackDone:false,shoutDone:false,
    panOffset:0,panMax:0,
    povShown:false,shakeExtra:false,fadeStarted:false,canSwitch:false,
    sub0:false,sub1:false,sub2:false,sub3:false,sub4:false};

  // 初始化canvas尺寸
  const bdc=qs('s5-board-canvas');if(bdc){bdc.width=W();bdc.height=H();}
  const fxc=qs('s5-fx-canvas');if(fxc){fxc.width=W();fxc.height=H();}
  const tc=qs('s5-torch-canvas');if(tc){tc.width=W();tc.height=H();}
  const sc=qs('s5-sparks');if(sc){sc.width=W();sc.height=H();}
  // 重置pov和fadeout
  const pov=qs('act5-pov');if(pov){pov.classList.remove('show');}
  const fo=qs('act5-fadeout');if(fo){fo.style.transition='none';fo.style.opacity='0';}

  // 计算全景最大偏移（等图片加载后）
  const skyImg=qs('s5-sky-img');
  function calcPanMax(){
    const imgW=skyImg.naturalWidth*(H()/skyImg.naturalHeight);
    act5.panMax=Math.max(0, imgW-W());
  }
  if(skyImg.complete&&skyImg.naturalWidth>0) calcPanMax();
  else skyImg.addEventListener('load',calcPanMax,{once:true});

  // 全景滑动事件（绑定document，和第四幕一致）
  function onPD(e){
    if(phase!=='main'||currentAct!==5) return;
    act5PointerDown=true;
    act5SwipeX=e.clientX??e.touches?.[0]?.clientX??0;
  }
  function onPM(e){
    if(!act5PointerDown||phase!=='main'||currentAct!==5) return;
    const cx=e.clientX??e.touches?.[0]?.clientX??0;
    const dx=cx-act5SwipeX;
    act5SwipeX=cx;
    if(dx>0){
      // 向右滑动：推进全景 + 点亮火把
      act5.panOffset=Math.min(act5.panMax, act5.panOffset+dx);
      act5SwipeTotalDx+=dx;
      const earned=Math.floor(act5SwipeTotalDx/60);
      if(earned>0){
        act5SwipeTotalDx-=earned*60;
        const newLit=Math.min(13,act5.torchLit+earned);
        if(newLit>act5.torchLit){act5.torchLit=newLit;hideHint();}
      }
    }
    // 火花粒子跟随手指
    if(Math.random()<.4) act5.sparks.push({
      x:cx,y:H()*.52+Math.random()*60,
      vx:(Math.random()-.3)*3,vy:-(1+Math.random()*2),
      life:1,r:2+Math.random()*2
    });
  }
  function onPU(){ act5PointerDown=false; }

  document.addEventListener('mousedown',onPD);
  document.addEventListener('mousemove',onPM);
  document.addEventListener('mouseup',onPU);
  document.addEventListener('touchstart',onPD,{passive:true});
  document.addEventListener('touchmove',onPM,{passive:true});
  document.addEventListener('touchend',onPU,{passive:true});
  act5._handlers={onPD,onPM,onPU};
}

function updateAct5(progress,sy){
  // 全景偏移
  const pan=act5.panOffset;
  const panorama=qs('s5-panorama');
  if(panorama) panorama.style.transform=`translateX(${-pan}px)`;

  // 桥面垂直位置（用于木板和水雾定位）
  const bridgeY=H()*0.54;

  // ── 木板掉落canvas（在桥PNG下方，从桥面往下掉） ──
  const bc=qs('s5-board-canvas');
  if(bc){
    if(bc.width!==W()||bc.height!==H()){bc.width=W();bc.height=H();}
    const bctx=bc.getContext('2d');
    bctx.clearRect(0,0,bc.width,bc.height);
    if(!act5._boards) act5._boards=[];
    // 生成：从桥面Y坐标往下，不叠在桥上
    if(Math.random()<.025){
      act5._boards.push({
        x:W()*.2+Math.random()*W()*.6,
        y:bridgeY+5,          // 从桥面正下方开始
        vx:(Math.random()-.5)*.8,
        vy:1.2+Math.random()*1.5,
        rot:Math.random()*Math.PI*2,
        vrot:(Math.random()-.5)*.06,
        w:12+Math.random()*16, // 更小
        h:3+Math.random()*3,   // 更薄
        life:1
      });
    }
    act5._boards=act5._boards.filter(b=>{
      b.x+=b.vx;b.y+=b.vy;b.rot+=b.vrot;b.life-=.006;
      if(b.life<=0||b.y>H()) return false;
      // 只在桥面下方绘制
      if(b.y<bridgeY) return true;
      bctx.save();
      bctx.globalAlpha=b.life*.75;
      bctx.translate(b.x,b.y);bctx.rotate(b.rot);
      bctx.fillStyle='#6a4020';
      bctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
      bctx.restore();
      return true;
    });
  }

  // ── 动效canvas：水雾+浪花（加强版） ──
  const fxc=qs('s5-fx-canvas');
  if(fxc){
    if(fxc.width!==W()||fxc.height!==H()){fxc.width=W();fxc.height=H();}
    const fx=fxc.getContext('2d');
    fx.clearRect(0,0,fxc.width,fxc.height);
    const t=Date.now()*.001;

    // 水雾（加强：更多、更大、更明显）
    for(let i=0;i<10;i++){
      const mx=(Math.sin(t*.25+i*0.9)*.5+.5)*fxc.width;
      const my=H()*.72+Math.sin(t*.4+i)*.03*H();
      const radius=180+Math.sin(t*.3+i)*40;
      const alpha=0.12+0.06*Math.sin(t*.5+i);
      const rg=fx.createRadialGradient(mx,my,0,mx,my,radius);
      rg.addColorStop(0,`rgba(255,255,255,${alpha})`);
      rg.addColorStop(.5,`rgba(220,235,255,${alpha*.5})`);
      rg.addColorStop(1,'rgba(255,255,255,0)');
      fx.fillStyle=rg;
      fx.beginPath();fx.ellipse(mx,my,radius*1.4,radius*.55,0,0,Math.PI*2);fx.fill();
    }
    // 水雾底部浓雾层
    const fogGrad=fx.createLinearGradient(0,H()*.75,0,H());
    fogGrad.addColorStop(0,'rgba(200,220,240,0)');
    fogGrad.addColorStop(.4,`rgba(200,220,240,${0.10+0.04*Math.sin(t*.3)})`);
    fogGrad.addColorStop(1,'rgba(200,220,240,0.18)');
    fx.fillStyle=fogGrad;
    fx.fillRect(0,H()*.75,fxc.width,H()*.25);

    // 浪花扰动（加强：更多波纹、更高透明度、更大振幅）
    for(let i=0;i<8;i++){
      const wy=H()*.65+i*14+Math.sin(t*.7+i)*8;
      const wOff=(t*.5+i*.25)%1;
      const wAlpha=0.22+0.12*Math.sin(t*.6+i);
      fx.strokeStyle=`rgba(200,230,255,${wAlpha})`;
      fx.lineWidth=1.8+Math.sin(t+i)*.5;
      fx.beginPath();
      for(let x=0;x<=fxc.width;x+=3){
        const wave=Math.sin((x/fxc.width+wOff)*Math.PI*8)*6;
        x===0?fx.moveTo(x,wy+wave):fx.lineTo(x,wy+wave);
      }
      fx.stroke();
    }
    // 白浪飞溅点
    fx.fillStyle='rgba(255,255,255,0.35)';
    for(let i=0;i<6;i++){
      const sx=(Math.sin(t*.4+i*1.3)*.5+.5)*fxc.width;
      const sy=H()*.68+Math.cos(t*.5+i)*H()*.04;
      const sr=3+Math.sin(t*2+i)*1.5;
      fx.beginPath();fx.arc(sx,sy,sr,0,Math.PI*2);fx.fill();
    }
  }

  // ── 火把光效canvas ──
  const tc=qs('s5-torch-canvas');
  if(tc){
    if(tc.width!==W()||tc.height!==H()){tc.width=W();tc.height=H();}
    const tctx=tc.getContext('2d');
    tctx.clearRect(0,0,tc.width,tc.height);
    const skyImg=qs('s5-sky-img');
    const imgW=skyImg.naturalWidth>0
      ? skyImg.naturalWidth*(H()/skyImg.naturalHeight)
      : W()*1.8;
    const bridgeLeft =imgW*0.20-pan;
    const bridgeRight=imgW*0.80-pan;
    const torchPositions=Array.from({length:13},(_,i)=>
      bridgeLeft+i/12*(bridgeRight-bridgeLeft));
    torchPositions.slice(0,act5.torchLit).forEach(tx=>{
      if(tx<-30||tx>W()+30) return;
      const flicker=0.85+Math.random()*0.15;
      const gg=tctx.createRadialGradient(tx,bridgeY-20,0,tx,bridgeY-20,28*flicker);
      gg.addColorStop(0,'rgba(255,180,50,.8)');
      gg.addColorStop(1,'rgba(255,80,0,0)');
      tctx.fillStyle=gg;
      tctx.beginPath();tctx.arc(tx,bridgeY-20,28*flicker,0,Math.PI*2);tctx.fill();
      tctx.fillStyle='rgba(255,230,100,.95)';
      tctx.beginPath();tctx.arc(tx,bridgeY-20,3,0,Math.PI*2);tctx.fill();
    });
  }

  // ── 火花粒子 ──
  const sc=qs('s5-sparks');
  if(sc){
    if(sc.width!==W()||sc.height!==H()){sc.width=W();sc.height=H();}
    const sctx=sc.getContext('2d');
    sctx.clearRect(0,0,sc.width,sc.height);
    act5.sparks=act5.sparks.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy*=.96;p.life-=.025;
      if(p.life<=0) return false;
      sctx.fillStyle=`rgba(255,${180+Math.floor(60*p.life)},40,${p.life*.8})`;
      sctx.beginPath();sctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);sctx.fill();
      return true;
    });
  }

  // 第五幕一进入就显示（不受火把门控）
  if(!act5.sub1){act5.sub1=true;
    showSub('前面的勇士在爬，后面的战友在跟。','narrate');}

  // 全部点亮后：震动 + 字幕 + 提示下滑
  if(act5.torchLit>=13&&!act5.shoutDone){
    act5.shoutDone=true;
    const sh=qs('act5-shout');sh.classList.add('show');
    qs('main').style.animation='screenShake .4s ease';
    setTimeout(()=>{qs('main').style.animation='';},400);
    setTimeout(()=>sh.classList.remove('show'),1500);
    setTimeout(()=>showSub('桥上不止我一人。','narrate'),600);
    // 全亮后提示下滑
    setTimeout(()=>setHint('↓ 继续下滑'),2000);
  }

  // ── 进度节点（火把全亮后才能触发） ──
  if(act5.torchLit<13) return; // 未全亮不触发后续节点

  if(progress>.17&&!act5.sub0){act5.sub0=true;
    showSub('铁索烫手，河水像要吃人。','narrate');}

  if(progress>.30&&!act5.povShown){
    act5.povShown=true;
    qs('act5-pov').classList.add('show');
    // 连续震动3次
    const shakeTriple=(delay)=>{
      setTimeout(()=>{
        qs('main').style.animation='screenShake .35s ease';
        setTimeout(()=>{qs('main').style.animation='';},350);
      },delay);
    };
    shakeTriple(0);shakeTriple(450);shakeTriple(900);
    // 对话框
    setTimeout(()=>{
      showPlayerDialog('娘，我可能回不去了。');
      setTimeout(()=>hidePlayerDialog(),4000);
    },1200);
  }

  if(progress>.40&&!act5.sub2){act5.sub2=true;
    showSub('但路，一定要走完。','narrate');}

  if(progress>.50&&!act5.shakeExtra){
    act5.shakeExtra=true;
    // 震动2次+重影
    const ai=qs('act5-afterimage');
    const shakeDouble=(delay)=>{
      setTimeout(()=>{
        qs('main').style.animation='screenShake .4s ease';
        if(ai){ai.style.opacity='1';setTimeout(()=>{ai.style.opacity='0';},180);}
        setTimeout(()=>{qs('main').style.animation='';},400);
      },delay);
    };
    shakeDouble(0);shakeDouble(500);
  }

  if(progress>.60&&!act5.sub3){act5.sub3=true;
    showSub('如果掉下去，我就是大渡河里的一块石头，','narrate');}

  if(progress>.70&&!act5.fadeStarted){
    act5.fadeStarted=true;
    const fo=qs('act5-fadeout');
    if(fo){fo.style.transition='opacity 2.5s ease';fo.style.opacity='1';}
  }

  if(progress>.80&&!act5.sub4){
    act5.sub4=true;
    // 最后一句在黑幕上居中显示，不走普通字幕条
    qs('act5-final-line').classList.add('show');
    setTimeout(()=>{ act5.canSwitch=true; },2000);
  }
  if(progress>.97&&act5.canSwitch) switchToAct(6);
}

// 第五幕：快速蒙太奇闪回
const flashbackScenes=[
  ()=>drawFlashback('于都河火把'),
  ()=>drawFlashback('草地萤火虫'),
  ()=>drawFlashback('赤水月亮'),
  ()=>drawFlashback('李狗蛋'),
  ()=>drawFlashback('识字课本'),
];
function drawFlashback(label){

  fb.innerHTML=`<span style="font-size:clamp(16px,2vw,22px);color:rgba(240,230,200,.7);
    letter-spacing:.3em;text-shadow:0 0 20px rgba(255,255,255,.3)">${label}</span>`;
  fb.classList.add('show');

  });
}
